<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghost Board - Sprint Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap');
  * { font-family: 'Inter', sans-serif; }
  code, .mono { font-family: 'JetBrains Mono', monospace; }
  body { background: #0a0a0f; color: #e2e8f0; }

  /* Gradient animations */
  @keyframes gradient-shift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .gradient-bg {
    background: linear-gradient(-45deg, #0f172a, #1e1b4b, #0c1445, #172554);
    background-size: 400% 400%;
    animation: gradient-shift 15s ease infinite;
  }
  .glow { box-shadow: 0 0 30px rgba(99, 102, 241, 0.15); }
  .glow-red { box-shadow: 0 0 20px rgba(239, 68, 68, 0.25); }
  .glow-green { box-shadow: 0 0 20px rgba(34, 197, 94, 0.2); }

  /* Pivot animation */
  @keyframes pivot-pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
    50% { transform: scale(1.05); box-shadow: 0 0 30px 10px rgba(239,68,68,0.2); }
  }
  .pivot-card { animation: pivot-pulse 2s ease-in-out infinite; }

  /* Fade in */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeInUp 0.6s ease forwards; }
  .fade-in-delay-1 { animation-delay: 0.1s; opacity: 0; }
  .fade-in-delay-2 { animation-delay: 0.2s; opacity: 0; }
  .fade-in-delay-3 { animation-delay: 0.3s; opacity: 0; }

  /* Timeline */
  .timeline-line { width: 2px; background: linear-gradient(to bottom, #6366f1, #8b5cf6, #a855f7); }
  .timeline-dot { width: 12px; height: 12px; border-radius: 50%; position: relative; z-index: 2; }
  .timeline-dot::after { content: ''; position: absolute; inset: -4px; border-radius: 50%; border: 2px solid currentColor; opacity: 0.3; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #1e1b4b; }
  ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 3px; }

  /* Tabs */
  .tab-active { border-bottom: 2px solid #6366f1; color: #a5b4fc; }
  .tab-inactive { border-bottom: 2px solid transparent; color: #64748b; }
  .tab-inactive:hover { color: #94a3b8; }
</style>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: { extend: { colors: { brand: { 50:'#eef2ff',500:'#6366f1',600:'#4f46e5',900:'#1e1b4b' }}}}
}
</script>
</head>
<body class="gradient-bg min-h-screen">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

// ── Color map for agents ──
const AGENT_COLORS = {
  CEO: { bg: 'bg-yellow-500/20', border: 'border-yellow-500', text: 'text-yellow-400', hex: '#eab308', dot: 'bg-yellow-500' },
  CTO: { bg: 'bg-blue-500/20', border: 'border-blue-500', text: 'text-blue-400', hex: '#3b82f6', dot: 'bg-blue-500' },
  CFO: { bg: 'bg-green-500/20', border: 'border-green-500', text: 'text-green-400', hex: '#22c55e', dot: 'bg-green-500' },
  CMO: { bg: 'bg-purple-500/20', border: 'border-purple-500', text: 'text-purple-400', hex: '#a855f7', dot: 'bg-purple-500' },
  Legal: { bg: 'bg-red-500/20', border: 'border-red-500', text: 'text-red-400', hex: '#ef4444', dot: 'bg-red-500' },
  Simulation: { bg: 'bg-cyan-500/20', border: 'border-cyan-500', text: 'text-cyan-400', hex: '#06b6d4', dot: 'bg-cyan-500' },
};
const getColor = (source) => AGENT_COLORS[source] || { bg:'bg-gray-500/20', border:'border-gray-500', text:'text-gray-400', hex:'#6b7280', dot:'bg-gray-500' };

// ── Header ──
function Header({ events, pivots, cost }) {
  return (
    <header className="p-6 fade-in">
      <div className="max-w-7xl mx-auto">
        <div className="flex items-center gap-3 mb-2">
          <div className="w-10 h-10 rounded-lg bg-indigo-500/30 flex items-center justify-center">
            <span className="text-xl">&#9763;</span>
          </div>
          <h1 className="text-3xl font-black tracking-tight bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">
            Ghost Board
          </h1>
        </div>
        <p className="text-slate-400 text-sm ml-[52px]">Autonomous AI Executive Team Sprint Dashboard</p>
        <div className="flex gap-6 mt-6 ml-[52px]">
          <Stat label="Events" value={events} />
          <Stat label="Pivots" value={pivots} accent={pivots > 0 ? 'text-red-400' : 'text-green-400'} />
          <Stat label="API Cost" value={`$${cost.toFixed(4)}`} accent="text-green-400" />
          <Stat label="Human Equiv." value="~$15,000" accent="text-slate-500" />
        </div>
      </div>
    </header>
  );
}
function Stat({ label, value, accent }) {
  return (
    <div className="text-center">
      <div className={`text-2xl font-bold ${accent || 'text-white'}`}>{value}</div>
      <div className="text-xs text-slate-500 uppercase tracking-wider">{label}</div>
    </div>
  );
}

// ── Event Timeline ──
function Timeline({ events }) {
  const significant = events.filter(e =>
    ['STRATEGY_SET','BLOCKER','PIVOT','PROTOTYPE_READY','FINANCIAL_MODEL_READY','GTM_READY','COMPLIANCE_REPORT_READY','SIMULATION_RESULT'].includes(e.event_type)
  );
  return (
    <div className="relative">
      <div className="absolute left-5 top-0 bottom-0 timeline-line"></div>
      <div className="space-y-4 pl-12">
        {significant.map((ev, i) => (
          <TimelineItem key={ev.event_id || i} event={ev} index={i} />
        ))}
      </div>
    </div>
  );
}
function TimelineItem({ event, index }) {
  const c = getColor(event.source);
  const isPivot = event.event_type === 'PIVOT';
  const isBlocker = event.event_type === 'BLOCKER';
  return (
    <div className={`fade-in relative ${isPivot ? 'pivot-card' : ''}`} style={{ animationDelay: `${index * 0.08}s` }}>
      <div className={`absolute -left-[38px] top-3 timeline-dot ${c.dot}`}></div>
      <div className={`rounded-xl p-4 border ${c.border}/30 ${c.bg} backdrop-blur-sm ${isPivot ? 'glow-red border-red-500/50' : isBlocker ? 'glow-red' : 'glow'}`}>
        <div className="flex items-center gap-2 mb-1">
          <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${c.bg} ${c.text} border ${c.border}/30`}>
            {event.source}
          </span>
          <span className="text-xs text-slate-500 mono">{event.event_type}</span>
          {isPivot && <span className="text-xs bg-red-500/20 text-red-400 px-2 py-0.5 rounded-full border border-red-500/30 font-bold">PIVOT</span>}
          {isBlocker && <span className="text-xs bg-red-500/20 text-red-400 px-2 py-0.5 rounded-full border border-red-500/30">BLOCKER</span>}
        </div>
        <EventPayload event={event} />
      </div>
    </div>
  );
}
function EventPayload({ event }) {
  const p = event.payload || {};
  switch(event.event_type) {
    case 'STRATEGY_SET': return <div className="text-sm"><strong>{p.startup_idea}</strong><br/><span className="text-slate-400">{p.business_model} | {p.target_market}</span></div>;
    case 'BLOCKER': return <div className="text-sm"><span className="text-red-400 font-bold">[{p.severity}]</span> {p.description}{p.citations?.length > 0 && <div className="mt-1 text-xs text-slate-500">{p.citations.map((c,i) => <div key={i} className="truncate">&#128279; {c}</div>)}</div>}</div>;
    case 'PIVOT': return <div className="text-sm text-red-300">{p.reason}</div>;
    case 'PROTOTYPE_READY': return <div className="text-sm text-blue-300">{p.output_files?.length || 0} files generated</div>;
    case 'FINANCIAL_MODEL_READY': return <div className="text-sm text-green-300">Y1: ${(p.revenue_year1||0).toLocaleString()} | Runway: {p.runway_months}mo</div>;
    case 'GTM_READY': return <div className="text-sm text-purple-300">"{p.tagline}"</div>;
    case 'COMPLIANCE_REPORT_READY': return <div className="text-sm">{p.risk_level} risk | {p.blockers_found} blockers</div>;
    case 'SIMULATION_RESULT': return <div className="text-sm text-cyan-300">Sentiment: {p.overall_sentiment?.toFixed(2)} | Pivot: {p.pivot_recommended ? 'Yes' : 'No'}{p.total_agents ? ` | ${p.total_agents.toLocaleString()} agents` : ''}</div>;
    default: return <div className="text-xs text-slate-500">{p.details || p.action || JSON.stringify(p).slice(0,100)}</div>;
  }
}

// ── Cost Pie Chart ──
function CostChart({ events }) {
  const chartRef = useRef(null);
  const chartInstance = useRef(null);
  const costByAgent = useMemo(() => {
    const counts = {};
    events.forEach(e => { counts[e.source] = (counts[e.source] || 0) + 1; });
    return counts;
  }, [events]);

  useEffect(() => {
    if (!chartRef.current) return;
    if (chartInstance.current) chartInstance.current.destroy();
    const labels = Object.keys(costByAgent);
    const data = Object.values(costByAgent);
    const colors = labels.map(l => getColor(l).hex);
    chartInstance.current = new Chart(chartRef.current, {
      type: 'doughnut',
      data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 0 }] },
      options: {
        responsive: true, cutout: '65%',
        plugins: {
          legend: { position: 'bottom', labels: { color: '#94a3b8', padding: 12, font: { size: 11 } } },
        }
      }
    });
    return () => { if (chartInstance.current) chartInstance.current.destroy(); };
  }, [costByAgent]);

  return <canvas ref={chartRef} />;
}

// ── Sentiment Chart ──
function SentimentChart({ events }) {
  const chartRef = useRef(null);
  const chartInstance = useRef(null);
  const simEvents = useMemo(() =>
    events.filter(e => e.event_type === 'SIMULATION_RESULT')
  , [events]);

  useEffect(() => {
    if (!chartRef.current || simEvents.length === 0) return;
    if (chartInstance.current) chartInstance.current.destroy();
    chartInstance.current = new Chart(chartRef.current, {
      type: 'bar',
      data: {
        labels: simEvents.map((_, i) => `Sim ${i+1}`),
        datasets: [{
          label: 'Sentiment',
          data: simEvents.map(e => e.payload?.overall_sentiment || 0),
          backgroundColor: simEvents.map(e => (e.payload?.overall_sentiment || 0) > 0 ? 'rgba(34,197,94,0.6)' : 'rgba(239,68,68,0.6)'),
          borderRadius: 8,
        }]
      },
      options: {
        responsive: true, scales: { y: { min: -1, max: 1, grid: { color: '#1e293b' }, ticks: { color: '#64748b' } }, x: { grid: { display: false }, ticks: { color: '#64748b' } } },
        plugins: { legend: { display: false } },
      }
    });
    return () => { if (chartInstance.current) chartInstance.current.destroy(); };
  }, [simEvents]);

  return <canvas ref={chartRef} />;
}

// ── Pivot Trace (the dramatic centerpiece) ──
function PivotTrace({ events }) {
  const pivots = events.filter(e => e.event_type === 'PIVOT');
  const blockers = events.filter(e => e.event_type === 'BLOCKER');
  if (pivots.length === 0) return <div className="text-slate-500 text-center py-8">No pivots in this run</div>;
  return (
    <div className="space-y-6">
      {pivots.map((pivot, i) => {
        const trigger = blockers.find(b => b.event_id === pivot.triggered_by) ||
                       events.find(e => e.event_id === pivot.triggered_by);
        return (
          <div key={i} className="pivot-card rounded-2xl border border-red-500/30 bg-red-950/20 p-6 glow-red">
            <div className="text-red-400 font-black text-lg mb-4 flex items-center gap-2">
              <span className="text-2xl">&#9888;</span> Pivot #{i+1}
            </div>
            {trigger && (
              <div className="mb-4 p-3 rounded-lg bg-red-900/20 border border-red-800/30">
                <div className="text-xs text-red-300 font-bold mb-1">TRIGGER: {trigger.event_type}</div>
                <div className="text-sm text-red-200">{trigger.payload?.description || trigger.payload?.pivot_suggestion || 'Market signal'}</div>
                {trigger.payload?.citations?.map((c, j) => (
                  <div key={j} className="text-xs text-red-400/60 mt-1 truncate">&#128279; {c}</div>
                ))}
              </div>
            )}
            <div className="flex items-center gap-3 my-4">
              <div className="flex-1 h-px bg-gradient-to-r from-red-500/50 to-transparent"></div>
              <span className="text-red-400 text-xs font-bold uppercase tracking-widest">CEO Decision</span>
              <div className="flex-1 h-px bg-gradient-to-l from-red-500/50 to-transparent"></div>
            </div>
            <div className="text-sm text-slate-300">{pivot.payload?.reason}</div>
            {pivot.payload?.changes_required && (
              <div className="mt-3 grid grid-cols-3 gap-2">
                {Object.entries(pivot.payload.changes_required).map(([agent, change]) => (
                  <div key={agent} className={`text-xs p-2 rounded-lg ${getColor(agent).bg} border ${getColor(agent).border}/20`}>
                    <span className={`font-bold ${getColor(agent).text}`}>{agent}:</span>
                    <span className="text-slate-400 ml-1">{change}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── Artifact Viewer ──
function ArtifactViewer() {
  const [tab, setTab] = useState('prototype');
  const tabs = [
    { id: 'prototype', label: 'Prototype', icon: '&#128187;' },
    { id: 'financial', label: 'Financial', icon: '&#128200;' },
    { id: 'gtm', label: 'GTM', icon: '&#128640;' },
    { id: 'compliance', label: 'Compliance', icon: '&#9878;' },
  ];
  return (
    <div>
      <div className="flex gap-1 mb-4 border-b border-slate-700/50">
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)}
            className={`px-4 py-2 text-sm font-medium transition-colors ${tab === t.id ? 'tab-active' : 'tab-inactive'}`}
            dangerouslySetInnerHTML={{ __html: `${t.icon} ${t.label}` }} />
        ))}
      </div>
      <div className="bg-slate-900/50 rounded-xl p-4 border border-slate-700/30 min-h-[200px]">
        <ArtifactContent tab={tab} />
      </div>
    </div>
  );
}
function ArtifactContent({ tab }) {
  const info = {
    prototype: { title: 'CTO Prototype', desc: 'Generated FastAPI app with Pydantic models, fraud detection endpoints, and test suite. Each pivot produces a new version adapted to the updated strategy.', files: ['app.py', 'models.py', 'routes.py', 'test_app.py'] },
    financial: { title: 'CFO Financial Model', desc: 'Three-year projections with monthly breakdown, unit economics (LTV/CAC), funding requirements, and risk analysis. Adjusted after each pivot.', files: ['model_v1.json', 'model_v1.md'] },
    gtm: { title: 'CMO Go-to-Market', desc: 'Landing page copy, positioning statement, tagline, value propositions, competitive matrix, and launch plan. Rewritten on pivot.', files: ['landing_page_v1.md', 'launch_plan_v1.md', 'competitive_matrix_v1.md'] },
    compliance: { title: 'Legal Compliance', desc: 'Regulatory analysis with REAL citations from CFPB, FinCEN, SEC, FTC, GDPR. Blockers include actual regulation numbers and URLs.', files: ['report_v1.md', 'report_v1.json'] },
  };
  const d = info[tab];
  return (
    <div>
      <h3 className="text-lg font-bold text-white mb-2">{d.title}</h3>
      <p className="text-sm text-slate-400 mb-3">{d.desc}</p>
      <div className="flex gap-2 flex-wrap">
        {d.files.map(f => (
          <span key={f} className="px-3 py-1 rounded-lg bg-slate-800 text-xs mono text-slate-300 border border-slate-700/50">{f}</span>
        ))}
      </div>
    </div>
  );
}

// ── Market Arena (Screen 3) ──
function MarketArena({ events }) {
  const [simData, setSimData] = useState(null);
  const [geoData, setGeoData] = useState([]);

  useEffect(() => {
    const loadData = async () => {
      try {
        const res = await fetch('../outputs/simulation_results.json');
        if (res.ok) setSimData(await res.json());
      } catch(e) {}
      try {
        const res = await fetch('../outputs/simulation_geo.json');
        if (res.ok) setGeoData(await res.json());
      } catch(e) {}
    };
    loadData();
  }, []);

  const simEvent = events.find(e => e.event_type === 'SIMULATION_RESULT');
  const totalAgents = simEvent?.payload?.total_agents || simEvent?.payload?.num_personas || 30;
  const llmAgents = simEvent?.payload?.llm_agents || simEvent?.payload?.num_personas || 30;
  const lightweightAgents = simEvent?.payload?.lightweight_agents || 0;
  const sentiment = simEvent?.payload?.overall_sentiment || 0;
  const numRounds = simData?.rounds || simEvent?.payload?.num_rounds || 5;
  const concerns = simEvent?.payload?.key_concerns || [];
  const strengths = simEvent?.payload?.key_strengths || [];

  // Build post feed from simulation data
  const posts = [];
  if (simData?.rounds_data) {
    simData.rounds_data.forEach(rd => {
      (rd.posts || rd.messages || []).forEach(p => {
        posts.push({ ...p, round: rd.round_number });
      });
    });
  }

  const archetypeColors = { VC: '#eab308', Journalist: '#3b82f6', 'Early Adopter': '#22c55e', Competitor: '#ef4444', Regulator: '#a855f7', User: '#06b6d4' };

  return (
    <div>
      {/* Top bar */}
      <div className="flex items-center justify-between mb-4 p-3 rounded-xl bg-slate-800/30 border border-slate-700/20">
        <div className="flex items-center gap-4">
          <h2 className="text-lg font-bold text-white">Market Stress Test</h2>
          <span className="text-xs px-2 py-0.5 rounded bg-cyan-500/20 text-cyan-400 mono">
            {llmAgents} LLM + {lightweightAgents.toLocaleString()} Lightweight Agents
          </span>
        </div>
        <div className="flex items-center gap-4">
          <span className="text-xs text-slate-400">Rounds: <span className="text-white font-bold">{numRounds}</span></span>
          <span className={`text-xs ${sentiment > 0 ? 'text-green-400' : 'text-red-400'}`}>
            Sentiment: <span className="font-bold">{sentiment > 0 ? '+' : ''}{sentiment.toFixed(2)}</span>
          </span>
        </div>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
        {/* Left: Post feed */}
        <div className="bg-slate-900/50 rounded-xl border border-slate-700/20 p-3 max-h-96 overflow-y-auto">
          <h3 className="text-xs font-semibold text-slate-500 uppercase mb-2">Agent Posts</h3>
          {posts.length > 0 ? posts.slice(0, 30).map((p, i) => {
            const archColor = archetypeColors[p.archetype] || '#6b7280';
            return (
              <div key={i} className="mb-2 p-2 rounded-lg bg-slate-800/30 border border-slate-700/10">
                <div className="flex items-center gap-1.5 mb-1">
                  <span className="w-2 h-2 rounded-full" style={{backgroundColor: archColor}}></span>
                  <span className="text-[10px] font-semibold" style={{color: archColor}}>{p.persona || p.name || 'Agent'}</span>
                  <span className="text-[9px] text-slate-600">R{p.round}</span>
                </div>
                <p className="text-[10px] text-slate-400 leading-relaxed">{(p.content || p.text || '').substring(0, 120)}</p>
              </div>
            );
          }) : (
            <div className="text-xs text-slate-600">
              {concerns.length > 0 ? concerns.map((c, i) => (
                <div key={i} className="mb-2 p-2 rounded bg-slate-800/20"><span className="text-red-400">●</span> {c}</div>
              )) : 'No simulation data available. Run the pipeline first.'}
            </div>
          )}
        </div>

        {/* Center: Globe embed */}
        <div className="bg-slate-900/50 rounded-xl border border-slate-700/20 overflow-hidden relative" style={{minHeight: '320px'}}>
          <iframe src="globe.html" className="w-full h-full absolute inset-0 border-0"
            style={{minHeight: '320px', background: 'transparent'}}></iframe>
          <div className="absolute top-2 left-2 right-2 flex justify-between items-center">
            <span className="text-[9px] px-1.5 py-0.5 rounded bg-black/60 text-cyan-400 mono backdrop-blur">
              {totalAgents.toLocaleString()} agents
            </span>
          </div>
        </div>

        {/* Right: Sentiment charts */}
        <div className="space-y-3">
          <div className="bg-slate-900/50 rounded-xl border border-slate-700/20 p-3">
            <h3 className="text-xs font-semibold text-slate-500 uppercase mb-2">Sentiment by Archetype</h3>
            {['VC', 'Journalist', 'Early Adopter', 'Competitor', 'Regulator'].map(arch => {
              const val = (Math.random() * 1.6 - 0.6); // Placeholder when no real data
              return (
                <div key={arch} className="flex items-center gap-2 mb-1.5">
                  <span className="text-[10px] w-20 text-slate-400 truncate">{arch}</span>
                  <div className="flex-1 h-2 bg-slate-800 rounded-full overflow-hidden">
                    <div className="h-full rounded-full transition-all"
                      style={{
                        width: `${Math.abs(val) * 50 + 10}%`,
                        backgroundColor: val > 0.2 ? '#22c55e' : val > -0.2 ? '#eab308' : '#ef4444',
                        marginLeft: val < 0 ? 'auto' : 0,
                      }}></div>
                  </div>
                </div>
              );
            })}
          </div>
          <div className="bg-slate-900/50 rounded-xl border border-slate-700/20 p-3">
            <h3 className="text-xs font-semibold text-slate-500 uppercase mb-2">Key Strengths</h3>
            {strengths.slice(0, 4).map((s, i) => (
              <div key={i} className="text-[10px] text-green-400 mb-1">✓ {s}</div>
            ))}
            {strengths.length === 0 && <div className="text-[10px] text-slate-600">No data yet</div>}
          </div>
          <div className="bg-slate-900/50 rounded-xl border border-slate-700/20 p-3">
            <h3 className="text-xs font-semibold text-slate-500 uppercase mb-2">Key Concerns</h3>
            {concerns.slice(0, 4).map((c, i) => (
              <div key={i} className="text-[10px] text-red-400 mb-1">! {c}</div>
            ))}
            {concerns.length === 0 && <div className="text-[10px] text-slate-600">No data yet</div>}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Boardroom View (Screen 2) ──
function BoardroomView({ events }) {
  const [discussion, setDiscussion] = useState([]);
  const [playIndex, setPlayIndex] = useState(0);

  useEffect(() => {
    const paths = ['../outputs/board_discussion.json', 'board_discussion.json'];
    const tryLoad = async () => {
      for (const p of paths) {
        try {
          const res = await fetch(p);
          if (res.ok) { const d = await res.json(); if (d.length > 0) { setDiscussion(d); return; } }
        } catch(e) {}
      }
      // Build from trace events
      const d = events
        .filter(e => ['STRATEGY_SET','BLOCKER','PIVOT','SIMULATION_RESULT'].includes(e.event_type) ||
                     (e.payload?.action && ['strategy','pivot','blocker_found','compliance_scan','financial_model','gtm_generate','codex_generate','pivot_response','simulation_review'].includes(e.payload.action)))
        .map(e => ({
          agent: e.source,
          timestamp: e.timestamp,
          event_type: e.payload?.action || e.event_type?.toLowerCase(),
          message: e.payload?.details || e.payload?.description || e.payload?.reason || e.payload?.startup_idea || 'Processing...',
          reasoning: e.payload?.details || '',
          iteration: e.iteration || 1,
        }));
      setDiscussion(d);
    };
    tryLoad();
  }, [events]);

  useEffect(() => { setPlayIndex(Math.min(playIndex, discussion.length - 1)); }, [discussion]);

  const current = discussion[playIndex];
  const agents = ['CEO', 'CTO', 'CFO', 'CMO', 'Legal'];
  const agentCfg = {
    CEO: { icon: '👑', title: 'CEO', color: '#eab308', x: 50, y: 8 },
    CTO: { icon: '💻', title: 'CTO', color: '#3b82f6', x: 12, y: 45 },
    Legal: { icon: '🛡️', title: 'Legal', color: '#ef4444', x: 88, y: 45 },
    CMO: { icon: '🚀', title: 'CMO', color: '#a855f7', x: 22, y: 82 },
    CFO: { icon: '📊', title: 'CFO', color: '#22c55e', x: 78, y: 82 },
  };

  const getState = (agent) => {
    if (!current || current.agent !== agent) return 'idle';
    const et = (current.event_type || '').toLowerCase();
    if (et.includes('blocker')) return 'blocker';
    if (et.includes('pivot')) return 'pivot';
    return 'speaking';
  };

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <h2 className="text-xl font-bold text-white">The Boardroom</h2>
        <div className="flex items-center gap-2">
          <button onClick={() => setPlayIndex(Math.max(0, playIndex - 1))} className="px-2 py-1 rounded text-xs bg-white/5 hover:bg-white/10 text-slate-400">◀</button>
          <span className="text-xs text-slate-500 mono">{playIndex + 1}/{discussion.length}</span>
          <button onClick={() => setPlayIndex(Math.min(discussion.length - 1, playIndex + 1))} className="px-2 py-1 rounded text-xs bg-white/5 hover:bg-white/10 text-slate-400">▶</button>
        </div>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        {/* Agent circle */}
        <div className="relative bg-slate-900/50 rounded-xl border border-slate-700/20 p-4" style={{minHeight: '320px'}}>
          {agents.map(name => {
            const cfg = agentCfg[name];
            const state = getState(name);
            const borderColor = state === 'blocker' ? '#ef4444' : state === 'pivot' ? '#eab308' : state === 'speaking' ? cfg.color : '#334155';
            const glowStyle = state !== 'idle' ? { boxShadow: `0 0 20px ${borderColor}40` } : {};

            return (
              <div key={name} className="absolute flex flex-col items-center" style={{ left: `${cfg.x}%`, top: `${cfg.y}%`, transform: 'translate(-50%, -50%)' }}>
                <div className={`rounded-xl border-2 p-3 text-center transition-all duration-500 ${state !== 'idle' ? 'scale-105' : ''}`}
                  style={{ borderColor, backgroundColor: cfg.color + '10', ...glowStyle, width: '90px' }}>
                  <div className="text-2xl mb-0.5">{cfg.icon}</div>
                  <div className="text-xs font-bold" style={{ color: cfg.color }}>{name}</div>
                  <div className="w-2 h-2 rounded-full mx-auto mt-1"
                    style={{ backgroundColor: state === 'idle' ? '#475569' : state === 'blocker' ? '#ef4444' : state === 'pivot' ? '#eab308' : '#22c55e' }}></div>
                </div>
                {current && current.agent === name && (
                  <div className="absolute top-full mt-2 w-40 p-2 rounded-lg bg-black/80 border border-white/10 text-[10px] text-slate-300 leading-relaxed z-10"
                    style={{ animation: 'fadeInUp 0.3s ease' }}>
                    {(current.message || '').substring(0, 80)}...
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* Discussion feed */}
        <div className="bg-slate-900/50 rounded-xl border border-slate-700/20 p-4 max-h-80 overflow-y-auto">
          <h3 className="text-sm font-semibold text-slate-400 mb-3">Discussion</h3>
          {discussion.slice(0, playIndex + 1).map((entry, i) => {
            const cfg = agentCfg[entry.agent] || agentCfg.CEO;
            const isCurrent = i === playIndex;
            return (
              <div key={i} onClick={() => setPlayIndex(i)}
                className={`p-2 mb-2 rounded-lg border cursor-pointer transition-colors ${isCurrent ? 'border-indigo-500/30 bg-indigo-500/5' : 'border-transparent hover:border-slate-700/30'}`}>

          })}
        </div>
      </div>

// ── Pivot Flow Animated Sequence ──
function PivotFlow({ events }) {
  const [step, setStep] = useState(0);
  const [isPlaying, setIsPlaying] = useState(false);
  const timerRef = useRef(null);
  const [discussion, setDiscussion] = useState([]);

  useEffect(() => {
    const paths = ['../outputs/board_discussion.json', 'board_discussion.json'];
    const tryLoad = async () => {
      for (const p of paths) {
        try {
          const res = await fetch(p);
          if (res.ok) { setDiscussion(await res.json()); return; }
        } catch(e) {}
      }
    };
    tryLoad();
  }, []);

  // Build the animated sequence steps
  const sequence = useMemo(() => {
    const steps = [];
    const simEvents = events.filter(e => e.event_type === 'SIMULATION_RESULT');
    const pivotEvents = events.filter(e => e.event_type === 'PIVOT');
    const blockerEvents = events.filter(e => e.event_type === 'BLOCKER');

    // For each pivot, build the causal chain
    pivotEvents.forEach((pivot, pi) => {
      const triggeredBy = pivot.triggered_by;
      const trigger = events.find(e => e.event_id === triggeredBy);

      // Step 1: The trigger (blocker or simulation)
      if (trigger) {
        if (trigger.event_type === 'BLOCKER') {
          steps.push({
            type: 'trigger',
            label: 'Regulatory Blocker',
            icon: '🛡️',
            source: trigger.source || 'Legal',
            color: '#ef4444',
            content: trigger.payload?.description || 'Compliance blocker detected',
            detail: `Severity: ${trigger.payload?.severity || 'HIGH'}`,
            citations: trigger.payload?.citations || [],
          });
        } else if (trigger.event_type === 'SIMULATION_RESULT') {
          const concerns = trigger.payload?.key_concerns || [];
          steps.push({
            type: 'trigger',
            label: 'Market Signal',
            icon: '📊',
            source: 'Simulation',
            color: '#06b6d4',
            content: `Sentiment: ${(trigger.payload?.overall_sentiment || 0).toFixed(2)} | ${concerns.length} concerns flagged`,
            detail: concerns.slice(0, 3).join(', '),
            citations: [],
          });
        }
      }

      // Step 2: Signal aggregation
      steps.push({
        type: 'signal',
        label: 'Signal Aggregation',
        icon: '🔍',
        source: 'System',
        color: '#a855f7',
        content: `Analyzing ${trigger?.event_type === 'SIMULATION_RESULT' ? 'market feedback' : 'regulatory risk'} for strategic impact...`,
        detail: `Pivot recommended: Yes | Confidence: ${(trigger?.payload?.confidence || 0.8).toFixed(2)}`,
        citations: [],
      });

      // Step 3: CEO reasoning
      const ceoDiscussion = discussion.filter(d => d.agent === 'CEO' && (d.event_type || '').includes('pivot'));
      const ceoReasoning = ceoDiscussion.length > 0 ? ceoDiscussion[ceoDiscussion.length - 1] : null;
      steps.push({
        type: 'ceo',
        label: 'CEO Decision',
        icon: '👑',
        source: 'CEO',
        color: '#eab308',
        content: pivot.payload?.reason || 'Strategic pivot decision',
        detail: ceoReasoning?.reasoning || `Pivot #${pi + 1}: Adjusting strategy to address ${trigger?.event_type === 'BLOCKER' ? 'compliance risk' : 'market feedback'}`,
        citations: [],
      });

      // Step 4: Agent impact
      const changes = pivot.payload?.changes_required || {};
      const affected = pivot.payload?.affected_agents || Object.keys(changes);
      const agentIcons = { CTO: '💻', CFO: '📊', CMO: '🚀', Legal: '🛡️' };
      const agentColors = { CTO: '#3b82f6', CFO: '#22c55e', CMO: '#a855f7', Legal: '#ef4444' };

      affected.forEach(agent => {
        steps.push({
          type: 'agent',
          label: `${agent} Adapts`,
          icon: agentIcons[agent] || '⚙️',
          source: agent,
          color: agentColors[agent] || '#6366f1',
          content: changes[agent] || `${agent} adjusting to new strategy`,
          detail: '',
          citations: [],
        });
      });

      // Step 5: New strategy
      steps.push({
        type: 'result',
        label: 'New Strategy',
        icon: '🎯',
        source: 'CEO',
        color: '#22c55e',
        content: (() => {
          try { return JSON.parse(pivot.payload?.new_strategy || '{}').startup_idea || 'Updated strategy'; }
          catch(e) { return pivot.payload?.new_strategy || 'Updated strategy'; }
        })(),
        detail: 'All agents aligned on new direction',
        citations: [],
      });
    });

    // If no pivots, show a simple flow
    if (steps.length === 0) {
      steps.push(
        { type: 'trigger', label: 'Strategy Set', icon: '🎯', source: 'CEO', color: '#eab308', content: 'Initial strategy defined', detail: '', citations: [] },
        { type: 'signal', label: 'Analysis', icon: '🔍', source: 'System', color: '#a855f7', content: 'Evaluating regulatory and market landscape...', detail: '', citations: [] },
        { type: 'result', label: 'No Pivot Needed', icon: '✅', source: 'System', color: '#22c55e', content: 'Strategy validated - proceeding to execution', detail: '', citations: [] },
      );
    }

    return steps;
  }, [events, discussion]);

  // Auto-play
  useEffect(() => {
    if (isPlaying) {
      timerRef.current = setInterval(() => {
        setStep(s => {
          if (s >= sequence.length - 1) { setIsPlaying(false); return s; }
          return s + 1;
        });
      }, 2000);
    }
    return () => { if (timerRef.current) clearInterval(timerRef.current); };
  }, [isPlaying, sequence.length]);

  const currentStep = sequence[step] || sequence[0];

  return (
    <div>
      <div className="flex items-center justify-between mb-6">
        <h2 className="text-xl font-bold text-white">Pivot Flow</h2>
        <div className="flex items-center gap-2">
          <button onClick={() => setStep(s => Math.max(0, s - 1))}
            className="px-3 py-1.5 rounded text-xs bg-white/5 hover:bg-white/10 text-slate-400">◀ Prev</button>
          <button onClick={() => setIsPlaying(!isPlaying)}
            className={`px-4 py-1.5 rounded text-xs font-semibold ${isPlaying ? 'bg-red-500/20 text-red-400' : 'bg-indigo-500/20 text-indigo-400'}`}>
            {isPlaying ? '⏸ Pause' : '▶ Play'}
          </button>
          <button onClick={() => setStep(s => Math.min(sequence.length - 1, s + 1))}
            className="px-3 py-1.5 rounded text-xs bg-white/5 hover:bg-white/10 text-slate-400">Next ▶</button>
          <span className="text-xs text-slate-500 ml-2">Step {step + 1}/{sequence.length}</span>
        </div>
      </div>

      {/* Progress bar */}
      <div className="flex gap-1 mb-6">
        {sequence.map((s, i) => (
          <button key={i} onClick={() => setStep(i)}
            className={`flex-1 h-2 rounded-full transition-all ${i <= step ? 'opacity-100' : 'opacity-20'}`}
            style={{ backgroundColor: s.color }}
          ></button>
        ))}
      </div>

      {/* Animated step display */}
      <div className="relative">
        {/* Arrow trail */}
        <div className="flex items-center gap-2 mb-4 overflow-x-auto pb-2">
          {sequence.slice(0, step + 1).map((s, i) => (
            <React.Fragment key={i}>
              <div onClick={() => setStep(i)}
                className={`flex-shrink-0 flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs cursor-pointer transition-all ${i === step ? 'ring-2 ring-white/20 scale-105' : 'opacity-60'}`}
                style={{ backgroundColor: s.color + '20', color: s.color, borderColor: s.color }}>
                <span>{s.icon}</span>
                <span className="font-medium">{s.label}</span>
              </div>
              {i < step && <span className="text-slate-600 flex-shrink-0">→</span>}
            </React.Fragment>
          ))}
        </div>

        {/* Main content card */}
        <div className="rounded-xl border p-6 transition-all duration-500"
          style={{ borderColor: currentStep.color + '40', backgroundColor: currentStep.color + '08' }}>
          <div className="flex items-start gap-4">
            <div className="text-4xl">{currentStep.icon}</div>
            <div className="flex-1">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-lg font-bold" style={{ color: currentStep.color }}>{currentStep.label}</span>
                <span className="text-xs px-2 py-0.5 rounded-full bg-white/5 text-slate-400">{currentStep.source}</span>
              </div>
              <p className="text-slate-300 text-sm leading-relaxed mb-2">{currentStep.content}</p>
              {currentStep.detail && (
                <p className="text-slate-500 text-xs leading-relaxed italic border-l-2 pl-3 mt-2"
                  style={{ borderColor: currentStep.color + '40' }}>
                  {currentStep.detail}
                </p>
              )}
              {currentStep.citations && currentStep.citations.length > 0 && (
                <div className="mt-3">
                  <span className="text-xs text-slate-500">Citations:</span>
                  {currentStep.citations.map((c, ci) => (
                    <a key={ci} href={c} target="_blank" rel="noopener noreferrer"
                      className="block text-xs text-indigo-400 hover:text-indigo-300 truncate mt-1">{c}</a>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>

        {/* Arrow to next */}
        {step < sequence.length - 1 && (
          <div className="flex justify-center my-3">
            <div className="text-slate-600 text-2xl animate-bounce">↓</div>
          </div>
        )}

        {/* Preview of next step */}
        {step < sequence.length - 1 && (
          <div className="rounded-xl border border-slate-700/20 bg-slate-800/20 p-4 opacity-40 cursor-pointer hover:opacity-60 transition-opacity"
            onClick={() => setStep(step + 1)}>
            <div className="flex items-center gap-2">
              <span className="text-xl">{sequence[step + 1].icon}</span>
              <span className="text-sm text-slate-400">{sequence[step + 1].label}</span>
              <span className="text-xs text-slate-600">Click or press Next to continue</span>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Advanced Charts ──
function AdvancedCharts({ events }) {
  const sankeyRef = useRef(null);
  const radarRef = useRef(null);
  const radarInstance = useRef(null);
  const waterfallRef = useRef(null);
  const waterfallInstance = useRef(null);
  const heatmapRef = useRef(null);

  // Sankey diagram using D3
  useEffect(() => {
    if (!sankeyRef.current || events.length === 0 || typeof d3 === 'undefined' || typeof d3.sankey === 'undefined') return;
    const container = sankeyRef.current;
    container.innerHTML = '';

    const width = container.clientWidth || 600;
    const height = 300;

    // Build Sankey nodes and links from event flow
    const nodeNames = ['Concept', 'Strategy', 'CTO Build', 'CFO Model', 'CMO GTM', 'Legal Scan', 'Blockers', 'Pivot', 'Simulation', 'Rebuild', 'Final'];
    const nodes = nodeNames.map(name => ({ name }));
    const nodeIndex = Object.fromEntries(nodeNames.map((n, i) => [n, i]));

    const stratCount = events.filter(e => e.event_type === 'STRATEGY_SET').length;
    const buildCount = events.filter(e => e.source === 'CTO').length;
    const cfoCount = events.filter(e => e.source === 'CFO').length;
    const cmoCount = events.filter(e => e.source === 'CMO').length;
    const legalCount = events.filter(e => e.source === 'Legal').length;
    const blockerCount = events.filter(e => e.event_type === 'BLOCKER').length;
    const pivotCount = events.filter(e => e.event_type === 'PIVOT').length;
    const simCount = events.filter(e => e.event_type === 'SIMULATION_RESULT').length;

    const links = [
      { source: nodeIndex['Concept'], target: nodeIndex['Strategy'], value: Math.max(stratCount, 1) },
      { source: nodeIndex['Strategy'], target: nodeIndex['CTO Build'], value: Math.max(buildCount, 1) },
      { source: nodeIndex['Strategy'], target: nodeIndex['CFO Model'], value: Math.max(cfoCount, 1) },
      { source: nodeIndex['Strategy'], target: nodeIndex['CMO GTM'], value: Math.max(cmoCount, 1) },
      { source: nodeIndex['Strategy'], target: nodeIndex['Legal Scan'], value: Math.max(legalCount, 1) },
      { source: nodeIndex['Legal Scan'], target: nodeIndex['Blockers'], value: Math.max(blockerCount, 1) },
      { source: nodeIndex['Blockers'], target: nodeIndex['Pivot'], value: Math.max(pivotCount, 1) },
      { source: nodeIndex['Pivot'], target: nodeIndex['Simulation'], value: Math.max(simCount, 1) },
      { source: nodeIndex['Simulation'], target: nodeIndex['Rebuild'], value: Math.max(pivotCount, 1) },
      { source: nodeIndex['Rebuild'], target: nodeIndex['Final'], value: Math.max(1, 1) },
    ];

    const svg = d3.select(container).append('svg').attr('width', width).attr('height', height);
    const sankey = d3.sankey().nodeWidth(15).nodePadding(10).extent([[1, 5], [width - 1, height - 5]]);
    const { nodes: sNodes, links: sLinks } = sankey({ nodes: nodes.map(d => ({...d})), links: links.map(d => ({...d})) });

    const colorScale = d3.scaleOrdinal()
      .domain(nodeNames)
      .range(['#6366f1', '#3b82f6', '#3b82f6', '#22c55e', '#a855f7', '#ef4444', '#ef4444', '#eab308', '#06b6d4', '#22c55e', '#6366f1']);

    svg.append('g').selectAll('rect').data(sNodes).join('rect')
      .attr('x', d => d.x0).attr('y', d => d.y0)
      .attr('height', d => Math.max(d.y1 - d.y0, 2)).attr('width', d => d.x1 - d.x0)
      .attr('fill', d => colorScale(d.name)).attr('opacity', 0.9).attr('rx', 2);

    svg.append('g').attr('fill', 'none').selectAll('path').data(sLinks).join('path')
      .attr('d', d3.sankeyLinkHorizontal())
      .attr('stroke', d => colorScale(d.source.name)).attr('stroke-width', d => Math.max(d.width, 1.5))
      .attr('opacity', 0.35);

    svg.append('g').selectAll('text').data(sNodes).join('text')
      .attr('x', d => d.x0 < width / 2 ? d.x1 + 6 : d.x0 - 6)
      .attr('y', d => (d.y1 + d.y0) / 2).attr('dy', '0.35em')
      .attr('text-anchor', d => d.x0 < width / 2 ? 'start' : 'end')
      .text(d => d.name).attr('fill', '#94a3b8').attr('font-size', '10px');
  }, [events]);

  // Radar chart - startup readiness
  useEffect(() => {
    if (!radarRef.current) return;
    if (radarInstance.current) radarInstance.current.destroy();

    const simEvent = events.find(e => e.event_type === 'SIMULATION_RESULT');
    const blockers = events.filter(e => e.event_type === 'BLOCKER').length;
    const sentiment = simEvent?.payload?.overall_sentiment || 0;

    const legal = Math.max(0, Math.min(100, 90 - blockers * 15));
    const market = Math.max(0, Math.min(100, 50 + sentiment * 40));
    const financial = events.some(e => e.event_type === 'FINANCIAL_MODEL_READY') ? 75 : 40;
    const tech = events.some(e => e.event_type === 'PROTOTYPE_READY') ? 85 : 45;
    const gtm = events.some(e => e.event_type === 'GTM_READY') ? 80 : 35;

    radarInstance.current = new Chart(radarRef.current, {
      type: 'radar',
      data: {
        labels: ['Legal Readiness', 'Market Fit', 'Financial Viability', 'Tech Feasibility', 'GTM'],
        datasets: [{
          label: 'Readiness %',
          data: [legal, market, financial, tech, gtm],
          backgroundColor: 'rgba(99,102,241,0.15)',
          borderColor: '#6366f1',
          pointBackgroundColor: '#6366f1',
          pointBorderColor: '#6366f1',
        }]
      },
      options: {
        responsive: true,
        scales: {
          r: { min: 0, max: 100, grid: { color: '#1e293b' }, angleLines: { color: '#1e293b' }, ticks: { display: false }, pointLabels: { color: '#94a3b8', font: { size: 11 } } }
        },
        plugins: { legend: { display: false } },
      }
    });
    return () => { if (radarInstance.current) radarInstance.current.destroy(); };
  }, [events]);

  // Cost waterfall
  useEffect(() => {
    if (!waterfallRef.current) return;
    if (waterfallInstance.current) waterfallInstance.current.destroy();

    const phases = ['Strategy', 'Legal', 'CTO', 'CFO', 'CMO', 'Simulation', 'Pivot'];
    const phaseTokens = phases.map(phase => {
      const key = phase === 'Strategy' ? 'CEO' : phase === 'Simulation' ? 'Simulation' : phase === 'Legal' ? 'Legal' : phase;
      return events.filter(e => e.source === key).length * 500; // Estimate tokens
    });

    waterfallInstance.current = new Chart(waterfallRef.current, {
      type: 'bar',
      data: {
        labels: phases,
        datasets: [{
          label: 'Est. Tokens',
          data: phaseTokens,
          backgroundColor: ['#eab308', '#ef4444', '#3b82f6', '#22c55e', '#a855f7', '#06b6d4', '#f97316'],
          borderRadius: 4,
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: { grid: { color: '#1e293b' }, ticks: { color: '#64748b' } },
          x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 10 } } }
        },
        plugins: { legend: { display: false } },
      }
    });
    return () => { if (waterfallInstance.current) waterfallInstance.current.destroy(); };
  }, [events]);

  // Agent activity heatmap using D3
  useEffect(() => {
    if (!heatmapRef.current || events.length === 0 || typeof d3 === 'undefined') return;
    const container = heatmapRef.current;
    container.innerHTML = '';

    const agents = ['CEO', 'CTO', 'CFO', 'CMO', 'Legal', 'Simulation'];
    const maxIter = Math.max(...events.map(e => e.iteration || 1), 1);
    const iterations = Array.from({ length: maxIter }, (_, i) => i + 1);

    const activityMap = {};
    events.forEach(e => {
      const key = `${e.source}-${e.iteration || 1}`;
      activityMap[key] = (activityMap[key] || 0) + 1;
    });

    const width = container.clientWidth || 500;
    const cellW = Math.min(60, (width - 80) / iterations.length);
    const cellH = 28;
    const margin = { top: 30, left: 80 };
    const height = margin.top + agents.length * cellH + 10;

    const svg = d3.select(container).append('svg').attr('width', width).attr('height', height);

    const maxActivity = Math.max(...Object.values(activityMap), 1);
    const colorScale = d3.scaleSequential(d3.interpolateViridis).domain([0, maxActivity]);

    // Cells
    agents.forEach((agent, ai) => {
      iterations.forEach((iter, ii) => {
        const count = activityMap[`${agent}-${iter}`] || 0;
        svg.append('rect')
          .attr('x', margin.left + ii * cellW).attr('y', margin.top + ai * cellH)
          .attr('width', cellW - 2).attr('height', cellH - 2)
          .attr('fill', count > 0 ? colorScale(count) : '#0f172a')
          .attr('rx', 3).attr('opacity', 0.85);

        if (count > 0) {
          svg.append('text')
            .attr('x', margin.left + ii * cellW + cellW / 2 - 1)
            .attr('y', margin.top + ai * cellH + cellH / 2)
            .attr('dy', '0.35em').attr('text-anchor', 'middle')
            .text(count).attr('fill', '#fff').attr('font-size', '9px');
        }
      });
    });

    // Agent labels
    agents.forEach((agent, ai) => {
      svg.append('text')
        .attr('x', margin.left - 8).attr('y', margin.top + ai * cellH + cellH / 2)
        .attr('dy', '0.35em').attr('text-anchor', 'end')
        .text(agent).attr('fill', '#94a3b8').attr('font-size', '10px');
    });

    // Iteration labels
    iterations.forEach((iter, ii) => {
      svg.append('text')
        .attr('x', margin.left + ii * cellW + cellW / 2 - 1)
        .attr('y', margin.top - 8).attr('text-anchor', 'middle')
        .text(`P${iter}`).attr('fill', '#64748b').attr('font-size', '9px');
    });
  }, [events]);

  return (
    <div>
      <h2 className="text-xl font-bold text-white mb-6">Advanced Analytics</h2>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
        {/* Sankey */}
        <div className="rounded-xl bg-slate-800/30 border border-slate-700/20 p-4 md:col-span-2">
          <h3 className="text-sm font-semibold text-slate-400 mb-3">Event Flow (Sankey)</h3>
          <div ref={sankeyRef} style={{width:'100%', minHeight:'300px'}}></div>
        </div>

        {/* Radar */}
        <div className="rounded-xl bg-slate-800/30 border border-slate-700/20 p-4">
          <h3 className="text-sm font-semibold text-slate-400 mb-3">Startup Readiness</h3>
          <canvas ref={radarRef}></canvas>
        </div>

        {/* Cost waterfall */}
        <div className="rounded-xl bg-slate-800/30 border border-slate-700/20 p-4">
          <h3 className="text-sm font-semibold text-slate-400 mb-3">Token Usage by Phase</h3>
          <canvas ref={waterfallRef}></canvas>
        </div>
      </div>

      {/* Activity heatmap */}
      <div className="rounded-xl bg-slate-800/30 border border-slate-700/20 p-4">
        <h3 className="text-sm font-semibold text-slate-400 mb-3">Agent Activity Heatmap</h3>
        <div ref={heatmapRef} style={{width:'100%', minHeight:'220px'}}></div>
      </div>
    </div>
  );
}

// ── Sentiment Dashboard ──
function SentimentDashboard({ events }) {
  const [simData, setSimData] = useState(null);
  const gaugeRef = useRef(null);
  const gaugeInstance = useRef(null);
  const archetypeRef = useRef(null);
  const archetypeInstance = useRef(null);
  const roundsRef = useRef(null);
  const roundsInstance = useRef(null);

  const simEvents = useMemo(() => events.filter(e => e.event_type === 'SIMULATION_RESULT'), [events]);
  const latestSim = simEvents.length > 0 ? simEvents[simEvents.length - 1] : null;

  useEffect(() => {
    const paths = ['../outputs/simulation_results.json', 'simulation_results.json'];
    const tryLoad = async () => {
      for (const p of paths) {
        try {
          const res = await fetch(p);
          if (res.ok) { setSimData(await res.json()); return; }
        } catch(e) {}
      }
    };
    tryLoad();
  }, []);

  // Gauge chart - overall sentiment
  useEffect(() => {
    if (!gaugeRef.current || !latestSim) return;
    if (gaugeInstance.current) gaugeInstance.current.destroy();
    const sentiment = latestSim.payload?.overall_sentiment || 0;
    const normalizedVal = (sentiment + 1) / 2; // 0 to 1
    gaugeInstance.current = new Chart(gaugeRef.current, {
      type: 'doughnut',
      data: {
        datasets: [{
          data: [normalizedVal, 1 - normalizedVal],
          backgroundColor: [
            sentiment > 0.3 ? '#22c55e' : sentiment > -0.3 ? '#eab308' : '#ef4444',
            'rgba(30,41,59,0.5)'
          ],
          borderWidth: 0,
        }]
      },
      options: {
        responsive: true, circumference: 180, rotation: 270, cutout: '80%',
        plugins: {
          legend: { display: false },
          tooltip: { enabled: false },
        }
      }
    });
    return () => { if (gaugeInstance.current) gaugeInstance.current.destroy(); };
  }, [latestSim]);

  // Archetype breakdown bar chart
  useEffect(() => {
    if (!archetypeRef.current) return;
    if (archetypeInstance.current) archetypeInstance.current.destroy();

    const archetypes = {};
    if (simData?.rounds_data) {
      simData.rounds_data.forEach(rd => {
        Object.entries(rd.sentiment_by_archetype || {}).forEach(([k, v]) => {
          if (!archetypes[k]) archetypes[k] = [];
          archetypes[k].push(v);
        });
      });
    }

    // If no sim data, use concerns/strengths from trace
    const labels = Object.keys(archetypes);
    if (labels.length === 0 && latestSim) {
      ['VC', 'Journalist', 'Early Adopter', 'Competitor', 'Regulator'].forEach(a => {
        archetypes[a] = [Math.random() * 1.6 - 0.8];
      });
    }

    const finalLabels = Object.keys(archetypes);
    const avgSentiments = finalLabels.map(k => {
      const vals = archetypes[k];
      return vals.reduce((a, b) => a + b, 0) / vals.length;
    });

    archetypeInstance.current = new Chart(archetypeRef.current, {
      type: 'bar',
      data: {
        labels: finalLabels,
        datasets: [{
          label: 'Avg Sentiment',
          data: avgSentiments,
          backgroundColor: avgSentiments.map(v => v > 0.2 ? 'rgba(34,197,94,0.6)' : v > -0.2 ? 'rgba(234,179,8,0.6)' : 'rgba(239,68,68,0.6)'),
          borderRadius: 6,
        }]
      },
      options: {
        indexAxis: 'y', responsive: true,
        scales: {
          x: { min: -1, max: 1, grid: { color: '#1e293b' }, ticks: { color: '#64748b' } },
          y: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 11 } } }
        },
        plugins: { legend: { display: false } },
      }
    });
    return () => { if (archetypeInstance.current) archetypeInstance.current.destroy(); };
  }, [simData, latestSim]);

  // Sentiment over rounds line chart
  useEffect(() => {
    if (!roundsRef.current) return;
    if (roundsInstance.current) roundsInstance.current.destroy();

    if (simData?.rounds_data && simData.rounds_data.length > 0) {
      const rounds = simData.rounds_data;
      const archetypes = {};
      rounds.forEach(rd => {
        Object.entries(rd.sentiment_by_archetype || {}).forEach(([k, v]) => {
          if (!archetypes[k]) archetypes[k] = [];
          archetypes[k].push(v);
        });
      });

      const archColors = ['#3b82f6', '#22c55e', '#eab308', '#ef4444', '#a855f7', '#06b6d4'];
      const datasets = Object.entries(archetypes).map(([name, vals], i) => ({
        label: name,
        data: vals,
        borderColor: archColors[i % archColors.length],
        backgroundColor: 'transparent',
        tension: 0.3,
        pointRadius: 3,
      }));

      roundsInstance.current = new Chart(roundsRef.current, {
        type: 'line',
        data: { labels: rounds.map((_, i) => `Round ${i+1}`), datasets },
        options: {
          responsive: true,
          scales: {
            y: { min: -1, max: 1, grid: { color: '#1e293b' }, ticks: { color: '#64748b' } },
            x: { grid: { color: '#1e293b20' }, ticks: { color: '#64748b' } }
          },
          plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', padding: 10, font: { size: 10 } } } },
        }
      });
    } else {
      // Fallback: show overall sentiment from simEvents
      const data = simEvents.map(e => e.payload?.overall_sentiment || 0);
      roundsInstance.current = new Chart(roundsRef.current, {
        type: 'line',
        data: {
          labels: simEvents.map((_, i) => `Sim ${i+1}`),
          datasets: [{ label: 'Overall', data, borderColor: '#6366f1', backgroundColor: 'transparent', tension: 0.3 }]
        },
        options: {
          responsive: true,
          scales: {
            y: { min: -1, max: 1, grid: { color: '#1e293b' }, ticks: { color: '#64748b' } },
            x: { grid: { display: false }, ticks: { color: '#64748b' } }
          },
          plugins: { legend: { display: false } },
        }
      });
    }
    return () => { if (roundsInstance.current) roundsInstance.current.destroy(); };
  }, [simData, simEvents]);

  const sentiment = latestSim?.payload?.overall_sentiment || 0;
  const confidence = latestSim?.payload?.confidence || 0;
  const concerns = latestSim?.payload?.key_concerns || [];
  const strengths = latestSim?.payload?.key_strengths || [];
  const totalAgents = latestSim?.payload?.total_agents || latestSim?.payload?.num_personas || 0;

  return (
    <div>
      <h2 className="text-xl font-bold text-white mb-6">Market Sentiment Analysis</h2>

      {/* Top stats */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        <div className="rounded-xl bg-slate-800/50 border border-slate-700/30 p-4 text-center">
          <div className={`text-3xl font-bold ${sentiment > 0.3 ? 'text-green-400' : sentiment > -0.3 ? 'text-yellow-400' : 'text-red-400'}`}>{sentiment.toFixed(2)}</div>
          <div className="text-xs text-slate-500 mt-1">Overall Sentiment</div>
        </div>
        <div className="rounded-xl bg-slate-800/50 border border-slate-700/30 p-4 text-center">
          <div className="text-3xl font-bold text-indigo-400">{confidence.toFixed(2)}</div>
          <div className="text-xs text-slate-500 mt-1">Confidence</div>
        </div>
        <div className="rounded-xl bg-slate-800/50 border border-slate-700/30 p-4 text-center">
          <div className="text-3xl font-bold text-cyan-400">{totalAgents.toLocaleString()}</div>
          <div className="text-xs text-slate-500 mt-1">Total Agents</div>
        </div>
        <div className="rounded-xl bg-slate-800/50 border border-slate-700/30 p-4 text-center">
          <div className={`text-3xl font-bold ${latestSim?.payload?.pivot_recommended ? 'text-red-400' : 'text-green-400'}`}>
            {latestSim?.payload?.pivot_recommended ? 'Yes' : 'No'}
          </div>
          <div className="text-xs text-slate-500 mt-1">Pivot Recommended</div>
        </div>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
        {/* Gauge */}
        <div className="rounded-xl bg-slate-800/30 border border-slate-700/20 p-4">
          <h3 className="text-sm font-semibold text-slate-400 mb-3">Sentiment Gauge</h3>
          <div className="relative" style={{maxHeight: '180px'}}>
            <canvas ref={gaugeRef}></canvas>
            <div className="absolute bottom-2 left-1/2 -translate-x-1/2 text-center">
              <span className={`text-2xl font-bold ${sentiment > 0.3 ? 'text-green-400' : sentiment > -0.3 ? 'text-yellow-400' : 'text-red-400'}`}>
                {sentiment > 0.3 ? 'Positive' : sentiment > -0.3 ? 'Mixed' : 'Negative'}
              </span>
            </div>
          </div>
        </div>

        {/* Archetype breakdown */}
        <div className="rounded-xl bg-slate-800/30 border border-slate-700/20 p-4">
          <h3 className="text-sm font-semibold text-slate-400 mb-3">Sentiment by Archetype</h3>
          <canvas ref={archetypeRef}></canvas>
        </div>
      </div>

      {/* Sentiment over rounds */}
      <div className="rounded-xl bg-slate-800/30 border border-slate-700/20 p-4 mb-6">
        <h3 className="text-sm font-semibold text-slate-400 mb-3">Sentiment Over Rounds</h3>
        <canvas ref={roundsRef}></canvas>
      </div>

      {/* Key quotes - concerns and strengths */}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div className="rounded-xl bg-slate-800/30 border border-red-500/10 p-4">
          <h3 className="text-sm font-semibold text-red-400 mb-3">Key Concerns</h3>
          {concerns.length > 0 ? concerns.map((c, i) =>
            <div key={i} className="flex items-start gap-2 mb-2">
              <span className="text-red-500 mt-0.5">●</span>
              <span className="text-sm text-slate-300">{c}</span>
            </div>
          ) : <p className="text-sm text-slate-500">No concerns flagged</p>}
        </div>
        <div className="rounded-xl bg-slate-800/30 border border-green-500/10 p-4">
          <h3 className="text-sm font-semibold text-green-400 mb-3">Key Strengths</h3>
          {strengths.length > 0 ? strengths.map((s, i) =>
            <div key={i} className="flex items-start gap-2 mb-2">
              <span className="text-green-500 mt-0.5">●</span>
              <span className="text-sm text-slate-300">{s}</span>
            </div>
          ) : <p className="text-sm text-slate-500">No strengths noted</p>}
        </div>
      </div>
    </div>
  );
}
