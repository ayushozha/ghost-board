<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghost Board - Sprint Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap');
  * { font-family: 'Inter', sans-serif; }
  code, .mono { font-family: 'JetBrains Mono', monospace; }
  body { background: #0a0a0f; color: #e2e8f0; }

  /* Gradient animations */
  @keyframes gradient-shift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .gradient-bg {
    background: linear-gradient(-45deg, #0f172a, #1e1b4b, #0c1445, #172554);
    background-size: 400% 400%;
    animation: gradient-shift 15s ease infinite;
  }
  .glow { box-shadow: 0 0 30px rgba(99, 102, 241, 0.15); }
  .glow-red { box-shadow: 0 0 20px rgba(239, 68, 68, 0.25); }
  .glow-green { box-shadow: 0 0 20px rgba(34, 197, 94, 0.2); }

  /* Pivot animation */
  @keyframes pivot-pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
    50% { transform: scale(1.05); box-shadow: 0 0 30px 10px rgba(239,68,68,0.2); }
  }
  .pivot-card { animation: pivot-pulse 2s ease-in-out infinite; }

  /* Fade in */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeInUp 0.6s ease forwards; }
  .fade-in-delay-1 { animation-delay: 0.1s; opacity: 0; }
  .fade-in-delay-2 { animation-delay: 0.2s; opacity: 0; }
  .fade-in-delay-3 { animation-delay: 0.3s; opacity: 0; }

  /* Timeline */
  .timeline-line { width: 2px; background: linear-gradient(to bottom, #6366f1, #8b5cf6, #a855f7); }
  .timeline-dot { width: 12px; height: 12px; border-radius: 50%; position: relative; z-index: 2; }
  .timeline-dot::after { content: ''; position: absolute; inset: -4px; border-radius: 50%; border: 2px solid currentColor; opacity: 0.3; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #1e1b4b; }
  ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 3px; }

  /* Tabs */
  .tab-active { border-bottom: 2px solid #6366f1; color: #a5b4fc; }
  .tab-inactive { border-bottom: 2px solid transparent; color: #64748b; }
  .tab-inactive:hover { color: #94a3b8; }

  /* ── Responsive Design ── */

  /* Prevent horizontal overflow on all screens */
  html, body { overflow-x: hidden; max-width: 100vw; }

  /* Tablet and below */
  @media (max-width: 768px) {
    /* Header */
    header .max-w-7xl { padding: 0 1rem; }
    header h1 { font-size: 1.5rem !important; }
    header .flex.gap-6 { flex-wrap: wrap; gap: 0.75rem; margin-left: 0 !important; }
    header p { margin-left: 0 !important; }

    /* Navigation tabs - wrap and scroll */
    .tab-nav-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      flex-wrap: nowrap !important;
      gap: 0 !important;
    }
    .tab-nav-wrap::-webkit-scrollbar { display: none; }
    .tab-nav-wrap button { flex-shrink: 0; padding: 0.5rem 0.75rem; font-size: 0.75rem; white-space: nowrap; }

    /* Main grid - stack on tablet */
    .main-grid { grid-template-columns: 1fr !important; }
    .main-grid .lg\\:col-span-2 { grid-column: span 1; }

    /* Boardroom agent circle - smaller cards */
    .boardroom-agents { min-height: 260px !important; }
    .boardroom-agents .agent-card-wrap > div:first-child { width: 75px !important; padding: 0.5rem !important; }
    .boardroom-agents .agent-card-wrap > div:first-child .text-2xl { font-size: 1.25rem; }

    /* Market Arena grid - stack */
    .arena-grid { grid-template-columns: 1fr !important; }
    .arena-grid > div { max-height: 320px; }

    /* Globe container */
    .globe-container { min-height: 250px !important; }
    .globe-container iframe { min-height: 250px !important; }

    /* Pivot Flow controls */
    .pivot-flow-controls { flex-wrap: wrap; gap: 0.5rem; }

    /* Timeline horizontal scroll for arrow trail */
    .pivot-trail { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 0.5rem; }
    .pivot-trail::-webkit-scrollbar { height: 4px; }
    .pivot-trail::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 2px; }

    /* Pivot card changes grid */
    .pivot-changes-grid { grid-template-columns: 1fr !important; }

    /* Analytics grid */
    .analytics-grid { grid-template-columns: 1fr !important; }
    .analytics-grid .md\\:col-span-2 { grid-column: span 1; }

    /* Sentiment stats grid */
    .sentiment-stats-grid { grid-template-columns: repeat(2, 1fr) !important; }

    /* Charts - ensure responsive */
    canvas { max-width: 100%; height: auto !important; }

    /* Font scaling */
    .text-5xl { font-size: 2rem !important; }
    .text-3xl { font-size: 1.5rem !important; }
    .text-2xl { font-size: 1.25rem !important; }
    .text-xl { font-size: 1.125rem !important; }

    /* Stat values */
    .stat-value { font-size: 1.25rem !important; }

    /* Cost visualization responsive */
    .gradient-border-card .text-3xl { font-size: 1.25rem !important; }
    .token-row td { padding: 0.4rem 0.5rem !important; font-size: 0.75rem; }
  }

  /* Mobile phone */
  @media (max-width: 480px) {
    /* Header */
    header { padding: 1rem !important; }
    header h1 { font-size: 1.25rem !important; }
    header .flex.gap-6, header .stats-row { gap: 0.5rem; justify-content: flex-start; }

    /* Navigation - smaller */
    .tab-nav-wrap button { padding: 0.4rem 0.5rem; font-size: 0.65rem; }

    /* Main container padding */
    .main-container { padding-left: 0.75rem !important; padding-right: 0.75rem !important; }

    /* Content card */
    .content-card { padding: 0.75rem !important; }

    /* Boardroom - agent cards stack vertically */
    .boardroom-agents { min-height: auto !important; position: relative; display: flex; flex-wrap: wrap; justify-content: center; gap: 0.75rem; padding: 0.75rem !important; }
    .boardroom-agents .agent-card-wrap { position: static !important; transform: none !important; }
    .boardroom-agents .agent-card-wrap > div:first-child { width: 72px !important; }
    .boardroom-agents .agent-card-wrap .absolute.top-full { position: relative !important; top: auto !important; margin-top: 0.25rem; width: auto !important; }

    /* Globe container */
    .globe-container { min-height: 200px !important; }
    .globe-container iframe { min-height: 200px !important; }

    /* Market Arena post feed */
    .arena-grid > div:first-child { max-height: 200px; }

    /* Timeline items */
    .timeline-line { left: 12px !important; }
    .space-y-4 { padding-left: 2rem !important; }

    /* Pivot card padding */
    .pivot-card { padding: 0.75rem !important; }

    /* Pivot changes grid - single column */
    .pivot-changes-grid { grid-template-columns: 1fr !important; }

    /* Stat cards */
    .sentiment-stats-grid { grid-template-columns: 1fr 1fr !important; }
    .sentiment-stats-grid > div { padding: 0.5rem !important; }
    .sentiment-stats-grid .text-3xl { font-size: 1.25rem !important; }

    /* Mission Control */
    .mission-title { font-size: 1.75rem !important; }
    .mission-input { padding: 0.75rem 1rem !important; font-size: 0.875rem !important; }
    .mission-tagline { font-size: 0.7rem !important; flex-direction: column; gap: 0.25rem; }
    .mission-tagline span { display: block; }

    /* Font scaling */
    .text-5xl { font-size: 1.75rem !important; }
    .text-3xl { font-size: 1.25rem !important; }
    .text-2xl { font-size: 1rem !important; }
    .text-xl { font-size: 0.9rem !important; }
    .text-lg { font-size: 0.85rem !important; }
    .text-sm { font-size: 0.75rem !important; }
    .text-xs { font-size: 0.65rem !important; }

    /* Sidebar charts */
    .sidebar-section { padding: 0.75rem !important; }
  }

  /* Smooth scrollbar for horizontal scroll areas */
  .overflow-x-auto { scrollbar-width: thin; }
  .overflow-x-auto::-webkit-scrollbar { height: 4px; }
  .overflow-x-auto::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 2px; }
  .overflow-x-auto::-webkit-scrollbar-track { background: transparent; }

  /* ── Agent Status Indicator Animations ── */

  /* Idle: gray pulsing dot */
  @keyframes status-idle-pulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.15); }
  }
  .status-dot-idle {
    background-color: #475569;
    animation: status-idle-pulse 2.5s ease-in-out infinite;
  }

  /* Thinking: blue spinning ring */
  @keyframes status-thinking-spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  .status-dot-thinking {
    background-color: transparent;
    border: 2px solid transparent;
    border-top-color: #3b82f6;
    border-right-color: #3b82f6;
    animation: status-thinking-spin 0.8s linear infinite;
  }

  /* Working: green pulsing glow */
  @keyframes status-working-pulse {
    0%, 100% { box-shadow: 0 0 4px 1px rgba(34, 197, 94, 0.3); opacity: 0.8; }
    50% { box-shadow: 0 0 10px 4px rgba(34, 197, 94, 0.5); opacity: 1; }
  }
  .status-dot-working {
    background-color: #22c55e;
    animation: status-working-pulse 1.5s ease-in-out infinite;
  }

  /* Done: solid green (no animation, steady) */
  .status-dot-done {
    background-color: #22c55e;
    box-shadow: 0 0 6px 2px rgba(34, 197, 94, 0.35);
  }
  .status-dot-done::after {
    content: '';
    display: block;
    width: 5px;
    height: 8px;
    border: solid #fff;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg) translate(-1px, -1px);
    position: absolute;
    top: 50%;
    left: 50%;
    margin-top: -5px;
    margin-left: -2px;
  }

  /* Blocked: red flashing */
  @keyframes status-blocked-flash {
    0%, 100% { background-color: #ef4444; box-shadow: 0 0 4px 1px rgba(239, 68, 68, 0.4); }
    50% { background-color: #7f1d1d; box-shadow: 0 0 12px 4px rgba(239, 68, 68, 0.7); }
  }
  .status-dot-blocked {
    background-color: #ef4444;
    animation: status-blocked-flash 0.6s ease-in-out infinite;
  }

  /* ── Connection Line Animations ── */

  /* Base connection line between agents */
  .agent-connection-line {
    position: absolute;
    height: 2px;
    background: rgba(71, 85, 105, 0.3);
    transform-origin: 0 50%;
    z-index: 0;
    pointer-events: none;
    transition: background 0.3s ease, box-shadow 0.3s ease;
  }

  /* Data flowing: blue pulse */
  @keyframes conn-pulse-blue {
    0% { background: rgba(99, 102, 241, 0.2); box-shadow: none; }
    50% { background: rgba(99, 102, 241, 0.8); box-shadow: 0 0 8px rgba(99, 102, 241, 0.5); }
    100% { background: rgba(99, 102, 241, 0.2); box-shadow: none; }
  }
  .conn-active {
    animation: conn-pulse-blue 1.5s ease-in-out infinite;
  }

  /* Blocker flowing: red flash */
  @keyframes conn-flash-red {
    0%, 100% { background: rgba(239, 68, 68, 0.3); box-shadow: none; }
    25% { background: rgba(239, 68, 68, 1); box-shadow: 0 0 12px rgba(239, 68, 68, 0.7); }
    50% { background: rgba(239, 68, 68, 0.3); box-shadow: none; }
    75% { background: rgba(239, 68, 68, 1); box-shadow: 0 0 12px rgba(239, 68, 68, 0.7); }
  }
  .conn-blocker {
    height: 3px;
    animation: conn-flash-red 1s ease-in-out infinite;
  }

  /* Pivot flowing: yellow flash */
  @keyframes conn-flash-yellow {
    0%, 100% { background: rgba(234, 179, 8, 0.2); box-shadow: none; }
    30% { background: rgba(234, 179, 8, 1); box-shadow: 0 0 10px rgba(234, 179, 8, 0.6); }
    60% { background: rgba(234, 179, 8, 0.2); box-shadow: none; }
  }
  .conn-pivot {
    height: 3px;
    animation: conn-flash-yellow 1.2s ease-in-out infinite;
  }

  /* Dot traveling along connection line */
  @keyframes conn-dot-travel {
    0% { left: 0%; opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { left: 100%; opacity: 0; }
  }
  .conn-dot {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    top: -1px;
    animation: conn-dot-travel 1.5s linear infinite;
  }

  /* ── Screen Transition Animations ── */

  @keyframes screen-fade-out {
    from { opacity: 1; transform: translateX(0); }
    to { opacity: 0; transform: translateX(-30px); }
  }
  @keyframes screen-slide-in {
    from { opacity: 0; transform: translateX(40px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .screen-enter {
    animation: screen-slide-in 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  }
  .screen-exit {
    animation: screen-fade-out 0.25s ease-in forwards;
    pointer-events: none;
  }

  /* ── Timeline Node Hover Effects ── */

  /* Timeline dots scale on hover */
  .timeline-dot {
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    cursor: pointer;
  }
  .timeline-dot:hover {
    transform: scale(1.4);
    box-shadow: 0 0 12px currentColor;
  }

  /* Timeline items expand on hover */
  .timeline-item-hover {
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    cursor: pointer;
  }
  .timeline-item-hover:hover {
    transform: scale(1.02) translateX(4px);
    box-shadow: 0 0 20px rgba(99, 102, 241, 0.15);
  }

  /* Pivot nodes: continuous subtle glow */
  @keyframes pivot-glow {
    0%, 100% { box-shadow: 0 0 8px 2px rgba(239, 68, 68, 0.2); }
    50% { box-shadow: 0 0 20px 6px rgba(239, 68, 68, 0.35); }
  }
  .pivot-node-glow {
    animation: pivot-glow 2.5s ease-in-out infinite;
  }

  /* Detail panel slides in from bottom on hover */
  @keyframes detail-slide-up {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .detail-panel-enter {
    animation: detail-slide-up 0.25s ease-out forwards;
  }

  /* Pivot flow step card hover glow */
  .pivot-trail-node {
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .pivot-trail-node:hover {
    transform: scale(1.12);
    box-shadow: 0 0 16px rgba(99, 102, 241, 0.3);
  }

  /* Agent card in boardroom: hover lift */
  .agent-card-boardroom {
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .agent-card-boardroom:hover {
    transform: scale(1.08);
  }

  /* ── Cost Visualization Animations ── */

  /* Bar grow animation */
  @keyframes bar-grow {
    from { height: 0; }
    to { height: var(--bar-height); }
  }
  .cost-bar-animate {
    animation: bar-grow 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  /* Multiplier badge pulse */
  @keyframes multiplier-pulse {
    0%, 100% { transform: scale(1); text-shadow: 0 0 20px rgba(34,197,94,0.4); }
    50% { transform: scale(1.06); text-shadow: 0 0 40px rgba(34,197,94,0.7); }
  }
  .multiplier-badge {
    animation: multiplier-pulse 2.5s ease-in-out infinite;
  }

  /* Gradient border card effect */
  .gradient-border-card {
    position: relative;
    background: #0f172a;
    border-radius: 12px;
    overflow: hidden;
  }
  .gradient-border-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    padding: 1.5px;
    background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899, #6366f1);
    background-size: 300% 300%;
    animation: gradient-shift 4s ease infinite;
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  /* Shimmer effect on token table rows */
  @keyframes shimmer-row {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  .token-row:hover {
    background: linear-gradient(90deg, transparent 0%, rgba(99,102,241,0.05) 50%, transparent 100%);
    background-size: 200% 100%;
    animation: shimmer-row 1.5s ease-in-out;
  }

  /* Cost bar label float */
  @keyframes float-label {
    0% { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .cost-label-float {
    animation: float-label 0.6s ease forwards;
    animation-delay: 1s;
    opacity: 0;
  }

  /* Dramatic arrow between bars */
  @keyframes arrow-draw {
    0% { width: 0; opacity: 0; }
    50% { opacity: 1; }
    100% { width: 100%; opacity: 1; }
  }
  .cost-arrow-line {
    animation: arrow-draw 0.8s ease-out forwards;
    animation-delay: 1.4s;
    width: 0;
    opacity: 0;
  }

  /* ── Live Mode Badge ── */
  @keyframes live-pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 4px 1px rgba(34,197,94,0.4); }
    50% { opacity: 0.6; box-shadow: 0 0 10px 4px rgba(34,197,94,0.7); }
  }
  .live-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #22c55e;
    animation: live-pulse 1.5s ease-in-out infinite;
    display: inline-block;
  }
  .live-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px; border-radius: 9999px;
    background: rgba(34,197,94,0.12);
    border: 1px solid rgba(34,197,94,0.3);
    font-size: 0.7rem; font-weight: 600; letter-spacing: 0.05em;
    color: #22c55e; text-transform: uppercase;
  }
  .offline-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px; border-radius: 9999px;
    background: rgba(100,116,139,0.12);
    border: 1px solid rgba(100,116,139,0.3);
    font-size: 0.7rem; font-weight: 600; letter-spacing: 0.05em;
    color: #64748b; text-transform: uppercase;
  }
</style>

<script type="text/babel">
// ── AudioManager: Web Audio API sound effects ──
class AudioManager {
  constructor() {
    this.ctx = null;
    this.muted = false;
    this._initialized = false;
  }

  _init() {
    if (this._initialized) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this._initialized = true;
    } catch(e) { console.warn('AudioManager: Web Audio not available'); }
  }

  _tone(freq, duration, type = 'sine', gain = 0.08) {
    if (!this.ctx || this.muted) return null;
    const osc = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
    g.gain.setValueAtTime(gain, this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
    osc.connect(g);
    g.connect(this.ctx.destination);
    osc.start();
    osc.stop(this.ctx.currentTime + duration);
    return { osc, gain: g };
  }

  play(sound) {
    this._init();
    if (!this.ctx || this.muted) return;
    if (this.ctx.state === 'suspended') this.ctx.resume();

    const t = this.ctx.currentTime;

    switch(sound) {
      case 'agent_complete': {
        // Soft ascending chime: 440Hz -> 880Hz over 200ms
        const osc = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, t);
        osc.frequency.exponentialRampToValueAtTime(880, t + 0.2);
        g.gain.setValueAtTime(0.06, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
        osc.connect(g); g.connect(this.ctx.destination);
        osc.start(t); osc.stop(t + 0.3);
        break;
      }
      case 'blocker': {
        // Low alert tone: 220Hz, 400ms, slight distortion
        const osc = this.ctx.createOscillator();
        const dist = this.ctx.createWaveShaper();
        const g = this.ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(220, t);
        osc.frequency.setValueAtTime(200, t + 0.2);
        // Subtle distortion curve
        const curve = new Float32Array(256);
        for (let i = 0; i < 256; i++) {
          const x = (i * 2) / 256 - 1;
          curve[i] = (Math.PI + 3) * x / (Math.PI + 3 * Math.abs(x));
        }
        dist.curve = curve;
        g.gain.setValueAtTime(0.07, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
        osc.connect(dist); dist.connect(g); g.connect(this.ctx.destination);
        osc.start(t); osc.stop(t + 0.5);
        break;
      }
      case 'pivot': {
        // Dramatic descending tone: 660Hz -> 330Hz over 500ms
        const osc = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(660, t);
        osc.frequency.exponentialRampToValueAtTime(330, t + 0.5);
        g.gain.setValueAtTime(0.08, t);
        g.gain.setValueAtTime(0.08, t + 0.3);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
        osc.connect(g); g.connect(this.ctx.destination);
        osc.start(t); osc.stop(t + 0.6);
        break;
      }
      case 'sim_tick': {
        // Quick tick: 1000Hz, 50ms
        const osc = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(1000, t);
        g.gain.setValueAtTime(0.04, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
        osc.connect(g); g.connect(this.ctx.destination);
        osc.start(t); osc.stop(t + 0.06);
        break;
      }
      case 'sprint_complete': {
        // Triumphant chord: 440 + 554 + 659Hz for 800ms
        [440, 554.37, 659.25].forEach((freq, i) => {
          const osc = this.ctx.createOscillator();
          const g = this.ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, t);
          g.gain.setValueAtTime(0.05, t + i * 0.05);
          g.gain.setValueAtTime(0.05, t + 0.5);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.9);
          osc.connect(g); g.connect(this.ctx.destination);
          osc.start(t + i * 0.05); osc.stop(t + 0.9);
        });
        break;
      }
      case 'launch': {
        // Rising sweep for warp launch
        const osc = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(200, t);
        osc.frequency.exponentialRampToValueAtTime(1200, t + 1.0);
        g.gain.setValueAtTime(0.05, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 1.1);
        osc.connect(g); g.connect(this.ctx.destination);
        osc.start(t); osc.stop(t + 1.1);
        break;
      }
      case 'tab_switch': {
        // Gentle click: very short sine pip
        const osc = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, t);
        g.gain.setValueAtTime(0.03, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
        osc.connect(g); g.connect(this.ctx.destination);
        osc.start(t); osc.stop(t + 0.04);
        break;
      }
    }
  }

  toggleMute() {
    this.muted = !this.muted;
    return this.muted;
  }
}

// ── Live Mode: API connection + WebSocket infrastructure ──
const API_BASE = '';

class LiveConnection {
  constructor() {
    this.isLive = false;
    this.runId = null;
    this.ws = null;
    this.listeners = new Set();
    this.pollTimer = null;
    this.status = 'disconnected'; // disconnected | connected | streaming
  }

  async tryConnect() {
    try {
      const resp = await fetch(`${API_BASE}/api/runs`, { signal: AbortSignal.timeout(3000) });
      if (!resp.ok) return false;
      const data = await resp.json();
      const runs = data.runs || [];
      if (runs.length > 0) {
        this.isLive = true;
        this.status = 'connected';
        // Pick the most recent run (runs are sorted most-recent-first by the API)
        this.runId = runs[0].run_id || runs[0].id;
        return true;
      }
      // API is reachable but no runs yet - still live mode
      this.isLive = true;
      this.status = 'connected';
      return true;
    } catch (e) {
      this.isLive = false;
      this.status = 'disconnected';
      return false;
    }
  }

  async fetchRunData(runId) {
    const rid = runId || this.runId;
    if (!rid) return null;
    try {
      const [traceResp, discussResp, simResp] = await Promise.all([
        fetch(`${API_BASE}/api/runs/${rid}/trace`, { signal: AbortSignal.timeout(5000) }),
        fetch(`${API_BASE}/api/runs/${rid}/board-discussion`, { signal: AbortSignal.timeout(5000) }),
        fetch(`${API_BASE}/api/runs/${rid}/simulation`, { signal: AbortSignal.timeout(5000) }),
      ]);
      const trace = traceResp.ok ? await traceResp.json() : { trace: [] };
      const discussion = discussResp.ok ? await discussResp.json() : { discussion: [] };
      const simulation = simResp.ok ? await simResp.json() : null;
      return {
        trace: trace.trace || trace.events || (Array.isArray(trace) ? trace : []),
        discussion: discussion.discussion || (Array.isArray(discussion) ? discussion : []),
        simulation: simulation,
      };
    } catch (e) {
      console.warn('Failed to fetch run data:', e);
      return null;
    }
  }

  async startSprint(concept) {
    try {
      const resp = await fetch(`${API_BASE}/api/sprint`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ concept, sim_scale: 'demo' }),
      });
      if (resp.ok) {
        const data = await resp.json();
        this.runId = data.run_id;
        this.connectWebSocket(data.run_id);
        return data;
      }
      return null;
    } catch (e) {
      console.warn('Failed to start sprint:', e);
      return null;
    }
  }

  connectWebSocket(runId) {
    const rid = runId || this.runId;
    if (!rid) return;
    if (this.ws) { try { this.ws.close(); } catch(e) {} }

    const wsProto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsHost = window.location.host;
    const wsUrl = `${wsProto}//${wsHost}/ws/live/${rid}`;

    try {
      this.ws = new WebSocket(wsUrl);
      this.ws.onopen = () => { this.status = 'streaming'; this._notify({ type: 'ws_connected' }); };
      this.ws.onmessage = (ev) => {
        try {
          const msg = JSON.parse(ev.data);
          this._notify({ type: 'ws_event', data: msg });
        } catch(e) {}
      };
      this.ws.onclose = () => { this.status = this.isLive ? 'connected' : 'disconnected'; this._notify({ type: 'ws_closed' }); };
      this.ws.onerror = () => { this.status = this.isLive ? 'connected' : 'disconnected'; };
    } catch(e) {
      console.warn('WebSocket connection failed:', e);
    }
  }

  startPolling(callback, intervalMs = 5000) {
    this.stopPolling();
    this.pollTimer = setInterval(async () => {
      try {
        const resp = await fetch(`${API_BASE}/api/runs`, { signal: AbortSignal.timeout(3000) });
        if (resp.ok) {
          const data = await resp.json();
          const runs = data.runs || [];
          if (runs.length > 0) {
            const latestId = runs[0].run_id || runs[0].id;
            if (latestId !== this.runId) {
              this.runId = latestId;
              callback({ type: 'new_run', runId: latestId });
            }
            // Also check status of current run
            const latestRun = runs[0];
            callback({ type: 'run_status', run: latestRun });
          }
        }
      } catch(e) {}
    }, intervalMs);
  }

  stopPolling() {
    if (this.pollTimer) { clearInterval(this.pollTimer); this.pollTimer = null; }
  }

  subscribe(fn) { this.listeners.add(fn); return () => this.listeners.delete(fn); }
  _notify(msg) { this.listeners.forEach(fn => { try { fn(msg); } catch(e) {} }); }

  destroy() {
    this.stopPolling();
    if (this.ws) { try { this.ws.close(); } catch(e) {} this.ws = null; }
    this.listeners.clear();
  }
}

const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ── Debounce utility for resize handlers ──
function useDebounce(fn, delay) {
  const timerRef = useRef(null);
  return useCallback((...args) => {
    if (timerRef.current) clearTimeout(timerRef.current);
    timerRef.current = setTimeout(() => fn(...args), delay);
  }, [fn, delay]);
}

// ── Window size hook with debounced resize ──
function useWindowSize() {
  const [size, setSize] = useState({ width: window.innerWidth, height: window.innerHeight });
  useEffect(() => {
    let timer = null;
    const handleResize = () => {
      if (timer) clearTimeout(timer);
      timer = setTimeout(() => {
        setSize({ width: window.innerWidth, height: window.innerHeight });
      }, 250);
    };
    window.addEventListener('resize', handleResize);
    return () => { window.removeEventListener('resize', handleResize); if (timer) clearTimeout(timer); };
  }, []);
  return size;
}

const AGENT_COLORS = {
  CEO: { bg: 'bg-yellow-500/20', border: 'border-yellow-500', text: 'text-yellow-400', hex: '#eab308', dot: 'bg-yellow-500' },
  CTO: { bg: 'bg-blue-500/20', border: 'border-blue-500', text: 'text-blue-400', hex: '#3b82f6', dot: 'bg-blue-500' },
  CFO: { bg: 'bg-green-500/20', border: 'border-green-500', text: 'text-green-400', hex: '#22c55e', dot: 'bg-green-500' },
  CMO: { bg: 'bg-purple-500/20', border: 'border-purple-500', text: 'text-purple-400', hex: '#a855f7', dot: 'bg-purple-500' },
  Legal: { bg: 'bg-red-500/20', border: 'border-red-500', text: 'text-red-400', hex: '#ef4444', dot: 'bg-red-500' },
  Simulation: { bg: 'bg-cyan-500/20', border: 'border-cyan-500', text: 'text-cyan-400', hex: '#06b6d4', dot: 'bg-cyan-500' },
};
const getColor = (source) => AGENT_COLORS[source] || { bg:'bg-gray-500/20', border:'border-gray-500', text:'text-gray-400', hex:'#6b7280', dot:'bg-gray-500' };

// ── Pivot reason parser: handles both plain text and JSON-stringified reasons ──
function parsePivotReason(reason) {
  if (!reason) return { summary: '', options: [], chosen: '', rationale: '', risk: '' };
  if (typeof reason !== 'string') return { summary: String(reason), options: [], chosen: '', rationale: '', risk: '' };
  try {
    const parsed = JSON.parse(reason);
    return {
      summary: parsed.summary || parsed.trigger_quote || reason,
      options: parsed.options_considered || [],
      chosen: parsed.chosen_option || '',
      rationale: parsed.rationale || '',
      risk: parsed.risk || '',
    };
  } catch(e) {
    return { summary: reason, options: [], chosen: '', rationale: '', risk: '' };
  }
}

// ── Filter internal keys from changes_required (underscore-prefixed keys are metadata) ──
function filterAgentChanges(changes) {
  if (!changes) return {};
  const result = {};
  for (const [key, val] of Object.entries(changes)) {
    if (!key.startsWith('_')) result[key] = val;
  }
  return result;
}

// ── Event Timeline ──
function Timeline({ events }) {
  const significant = events.filter(e =>
    ['STRATEGY_SET','BLOCKER','PIVOT','PROTOTYPE_READY','FINANCIAL_MODEL_READY','GTM_READY','COMPLIANCE_REPORT_READY','SIMULATION_RESULT'].includes(e.event_type)
  );
  return (
    <div className="relative">
      <div className="absolute left-5 top-0 bottom-0 timeline-line"></div>
      <div className="space-y-4 pl-12">
        {significant.map((ev, i) => (
          <TimelineItem key={ev.event_id || i} event={ev} index={i} />
        ))}
      </div>
    </div>
  );
}
function TimelineItem({ event, index }) {
  const c = getColor(event.source);
  const isPivot = event.event_type === 'PIVOT';
  const isBlocker = event.event_type === 'BLOCKER';
  const isSimResult = event.event_type === 'SIMULATION_RESULT';
  const isComplete = ['PROTOTYPE_READY','FINANCIAL_MODEL_READY','GTM_READY','COMPLIANCE_REPORT_READY'].includes(event.event_type);

  // Play sound when timeline item scrolls into view
  const itemRef = useRef(null);
  const soundPlayed = useRef(false);
  useEffect(() => {
    if (soundPlayed.current || !itemRef.current) return;
    const observer = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting && !soundPlayed.current) {
        soundPlayed.current = true;
        if (isPivot) audioManager.play('pivot');
        else if (isBlocker) audioManager.play('blocker');
        else if (isSimResult) audioManager.play('sim_tick');
        else if (isComplete) audioManager.play('agent_complete');
        observer.disconnect();
      }
    }, { threshold: 0.5 });
    observer.observe(itemRef.current);
    return () => observer.disconnect();
  }, []);

  return (
    <div ref={itemRef} className={`fade-in relative timeline-item-hover ${isPivot ? 'pivot-card pivot-node-glow' : ''}`} style={{ animationDelay: `${index * 0.08}s` }}>
      <div className={`absolute -left-[38px] top-3 timeline-dot ${c.dot} ${isPivot ? 'pivot-node-glow' : ''}`}
        style={isPivot ? { width: '16px', height: '16px', marginLeft: '-2px', marginTop: '-2px' } : {}}></div>
      <div className={`rounded-xl p-4 border ${c.border}/30 ${c.bg} backdrop-blur-sm ${isPivot ? 'glow-red border-red-500/50' : isBlocker ? 'glow-red' : 'glow'}`}>
        <div className="flex items-center gap-2 mb-1">
          <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${c.bg} ${c.text} border ${c.border}/30`}>
            {event.source}
          </span>
          <span className="text-xs text-slate-500 mono">{event.event_type}</span>
          {isPivot && <span className="text-xs bg-red-500/20 text-red-400 px-2 py-0.5 rounded-full border border-red-500/30 font-bold">PIVOT</span>}
          {isBlocker && <span className="text-xs bg-red-500/20 text-red-400 px-2 py-0.5 rounded-full border border-red-500/30">BLOCKER</span>}
        </div>
        <EventPayload event={event} />
      </div>
    </div>
  );
}
function EventPayload({ event }) {
  const p = event.payload || {};
  switch(event.event_type) {
    case 'STRATEGY_SET': return <div className="text-sm"><strong>{p.startup_idea}</strong><br/><span className="text-slate-400">{p.business_model} | {p.target_market}</span></div>;

                          {typeof opt === 'string' ? opt : opt.option || opt.description || JSON.stringify(opt)}
                          {(opt === pr.chosen || opt.option === pr.chosen) && <span className="ml-2 text-yellow-400 font-bold">&larr; CHOSEN</span>}
                        </div>
                      ))}
                    </div>
                  )}
                  {pr.chosen && !pr.options.length && <div className="text-xs text-yellow-400 mb-2"><span className="font-bold">Decision:</span> {pr.chosen}</div>}
                  {pr.rationale && <div className="text-xs text-slate-400 mb-2 italic">{pr.rationale}</div>}
                  {pr.risk && <div className="text-xs text-orange-400/70 mb-2"><span className="font-semibold">Risk:</span> {pr.risk}</div>}
                  {pivot.payload?.old_strategy && pivot.payload?.new_strategy && (
                    <div className="mt-2 p-2 rounded-lg bg-slate-800/30 border border-slate-700/20">
                      <div className="text-xs text-slate-500 line-through mb-1">{typeof pivot.payload.old_strategy === 'string' && pivot.payload.old_strategy.startsWith('{') ? (() => { try { return JSON.parse(pivot.payload.old_strategy).startup_idea; } catch(e) { return pivot.payload.old_strategy; }})() : pivot.payload.old_strategy}</div>
                      <div className="text-xs text-green-400">&rarr; {typeof pivot.payload.new_strategy === 'string' && pivot.payload.new_strategy.startsWith('{') ? (() => { try { return JSON.parse(pivot.payload.new_strategy).startup_idea; } catch(e) { return pivot.payload.new_strategy; }})() : pivot.payload.new_strategy}</div>
                    </div>
                  )}
                  {Object.keys(changes).length > 0 && (
                    <div className="mt-3 grid grid-cols-2 gap-2 pivot-changes-grid">
                      {Object.entries(changes).map(([agent, change]) => (
                        <div key={agent} className={`text-xs p-2 rounded-lg ${getColor(agent).bg} border ${getColor(agent).border}/20`}>
                          <span className={`font-bold ${getColor(agent).text}`}>{agent}:</span>
                          <span className="text-slate-400 ml-1">{typeof change === 'string' ? change : JSON.stringify(change)}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })()}
          </div>
        );
      })}
    </div>
  );
}

// ── Count-Up Hook ──
function useCountUp(target, duration, active, decimals = 0) {
  const [value, setValue] = useState(0);
  useEffect(() => {
    if (!active) { setValue(0); return; }
    let start = 0;
    const startTime = performance.now();
    const step = (now) => {
      const elapsed = now - startTime;
      const progress = Math.min(elapsed / duration, 1);
      // Ease-out cubic
      const eased = 1 - Math.pow(1 - progress, 3);
      const current = eased * target;
      setValue(decimals > 0 ? parseFloat(current.toFixed(decimals)) : Math.floor(current));
      if (progress < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }, [target, duration, active, decimals]);
  return value;
}

function FullReportContent({ isLive, runId }) {
  const [report, setReport] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  useEffect(() => {
    const loadReport = async () => {
      setLoading(true);
      setError(null);
      const rid = runId || 'latest';
      const paths = [
        `${API_BASE}/api/runs/${rid}/sprint-report`,
        `${API_BASE}/api/runs/latest/sprint-report`,
      ];
      for (const p of paths) {
        try {
          const res = await fetch(p, { signal: AbortSignal.timeout(5000) });
          if (res.ok) {
            const data = await res.json();
            const text = data.report || data.content || (typeof data === 'string' ? data : null);
            if (text) {
              setReport(text);
              setLoading(false);
              return;
            }
          }
        } catch(e) {}
      }
      // Try direct file fetch
      try {
        const res = await fetch(`${API_BASE}/api/artifacts/sprint_report.md`, { signal: AbortSignal.timeout(5000) });
        if (res.ok) {
          const text = await res.text();
          if (text && text.length > 10) {
            setReport(text);
            setLoading(false);
            return;
          }
        }
      } catch(e) {}
      setError('Sprint report not available. Run a sprint first to generate the full report.');
      setLoading(false);
    };
    loadReport();
  }, [isLive, runId]);

  if (loading) return <div className="text-slate-400 animate-pulse py-8 text-center">Loading full report...</div>;
  if (error) return <div className="text-slate-500 py-8 text-center">{error}</div>;

  return (
    <div>
      <h3 className="text-lg font-bold text-white mb-3">Full Sprint Report</h3>
      <div className="bg-slate-950/60 rounded-xl border border-slate-700/20 p-5 max-h-[600px] overflow-y-auto">
        <pre className="whitespace-pre-wrap text-sm text-slate-300 mono leading-relaxed">{report}</pre>
      </div>
    </div>
  );
}

    financial: { folder: 'financial_model', title: 'CFO Financial Model', desc: 'Multi-year projections with monthly breakdown, unit economics, funding requirements, and risk analysis. Adjusted after each pivot.' },
    gtm: { folder: 'gtm', title: 'CMO Go-to-Market', desc: 'Landing page copy, positioning statement, tagline, value propositions, competitive matrix, and launch plan. Rewritten on pivot.' },
    compliance: { folder: 'compliance', title: 'Legal Compliance', desc: 'Regulatory analysis with REAL citations from CFPB, FinCEN, SEC, FTC, GDPR. Blockers include actual regulation numbers and URLs.' },
  };

      setLoadingList(true);
      setSelectedFile(null);
      setFileContent(null);
      const rid = runId || 'latest';
      const paths = [
        `${API_BASE}/api/runs/${rid}/artifacts`,
        `${API_BASE}/api/runs/latest/artifacts`,
      ];
      for (const p of paths) {
        try {
          const res = await fetch(p, { signal: AbortSignal.timeout(5000) });
          if (res.ok) {
            const data = await res.json();
            const allArtifacts = data.artifacts || data || [];
            // Filter to current category folder
            const filtered = allArtifacts.filter(a => {
              const filePath = a.path || a.file_path || '';
              return filePath.startsWith(cat.folder + '/') || filePath.startsWith(cat.folder + '\\');
            });
            if (filtered.length > 0) {
              setArtifacts(filtered);
              setLoadingList(false);
              return;
            }
          }
        } catch(e) {}
      }
      // No artifacts found from API
      setArtifacts([]);
      setLoadingList(false);
    };
    loadArtifacts();
  }, [tab, isLive, runId]);

  useEffect(() => {
    if (!selectedFile) { setFileContent(null); return; }

      setLoadingFile(true);
      const filePath = selectedFile.path || selectedFile.file_path || '';
      try {
        const res = await fetch(`${API_BASE}/api/artifacts/${filePath}`, { signal: AbortSignal.timeout(8000) });

          const text = await res.text();
          setFileContent(text);
          setLoadingFile(false);
          return;
        }
      } catch(e) {}
      // Try content_preview from artifact data
      if (selectedFile.content_preview) {
        setFileContent(selectedFile.content_preview);
      } else {
        setFileContent('(Could not load file content)');
      }
      setLoadingFile(false);
    };
    loadFile();
  }, [selectedFile]);

    <div>

      <p className="text-sm text-slate-400 mb-3">{cat.desc}</p>
