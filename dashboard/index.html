        <div className="text-slate-400 animate-pulse py-4">Loading artifacts...</div>
      ) : artifacts.length === 0 ? (
        <div className="py-2">
          <div className="flex gap-2 flex-wrap mb-3">
            {(({
              prototype: ['app.py', 'models.py', 'config.py', 'routes/users.py', 'routes/analytics.py', 'routes/compliance.py', 'routes/hipaa.py', 'test_app.py', 'README.md'],
              financial: ['financial_model.json', 'scenarios.json', 'financial_model.md'],
              gtm: ['gtm_strategy.md', 'positioning.md', 'competitive_matrix.md', 'landing_page.html', 'taglines.json'],
              compliance: ['report_v1.md', 'report_v1.json', 'citations.json'],
            })[tab] || []).map(f => (
              <span key={f} className="px-3 py-1 rounded-lg bg-slate-800 text-xs mono text-slate-400 border border-slate-700/50">{f}</span>
            ))}
          </div>
          <p className="text-xs text-slate-600">Files generated during sprint. Connect to the API server or run a sprint to view contents.</p>
        </div>
      ) : (
        <div>
          <div className="flex gap-2 flex-wrap mb-4">
            {artifacts.map(a => {
              const name = a.name || (a.path || a.file_path || '').split('/').pop();
              const isActive = selectedFile && (selectedFile.path || selectedFile.file_path) === (a.path || a.file_path);
              return (
                <button key={a.path || a.file_path} onClick={() => setSelectedFile(a)}
                  className={`px-3 py-1.5 rounded-lg text-xs mono border transition-colors ${isActive ? 'bg-indigo-600/30 text-indigo-300 border-indigo-500/50' : 'bg-slate-800 text-slate-300 border-slate-700/50 hover:bg-slate-700/50 hover:text-white'}`}>
                  {name}
                  {a.size ? <span className="ml-1 text-slate-500">({(a.size / 1024).toFixed(1)}k)</span> : null}
                </button>
              );
            })}
          </div>
          {selectedFile && (
            <div className="bg-slate-950/60 rounded-xl border border-slate-700/20 p-4 max-h-[500px] overflow-y-auto">
              <div className="flex items-center justify-between mb-3 pb-2 border-b border-slate-700/30">
                <span className="text-xs mono text-indigo-400">{selectedFile.path || selectedFile.file_path}</span>
                <button onClick={() => setSelectedFile(null)} className="text-xs text-slate-500 hover:text-slate-300">Close</button>
              </div>
              {loadingFile ? (
                <div className="text-slate-400 animate-pulse py-4">Loading file...</div>
              ) : (
                <pre className="whitespace-pre-wrap text-xs text-slate-300 mono leading-relaxed">{fileContent}</pre>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── Market Arena (Screen 3) ──
function MarketArena({ events, liveSimulation, isLive, runId }) {
  const [simData, setSimData] = useState(null);
  const [geoData, setGeoData] = useState([]);

  // If we got live simulation data from parent, use it
  useEffect(() => {
    if (liveSimulation) {
      setSimData(liveSimulation);
    }
  }, [liveSimulation]);

  useEffect(() => {
    const loadData = async () => {
      // Try run-scoped API first if live
      const simPaths = [];
      if (isLive && runId) {
        simPaths.push(`${API_BASE}/api/runs/${runId}/simulation`);
      }
      simPaths.push('/api/simulation/results', '../outputs/simulation_results.json', 'simulation_results.json');

      let loaded = false;
      for (const p of simPaths) {
        try {
          const res = await fetch(p);
          if (res.ok) {
            const raw = await res.json();
            setSimData(raw.simulation || raw);
            loaded = true;
            break;
          }
        } catch(e) {}
      }
      if (!loaded && !liveSimulation) setSimData(DEMO_SIMULATION);

      const geoPaths = [];
      if (isLive && runId) {
        geoPaths.push(`${API_BASE}/api/runs/${runId}/simulation-geo`);
      }
      geoPaths.push('/api/simulation/geo', '../outputs/simulation_geo.json', 'simulation_geo.json');
      for (const p of geoPaths) {
        try {
          const res = await fetch(p);
          if (res.ok) {
            const raw = await res.json();
            setGeoData(raw.geo || (Array.isArray(raw) ? raw : []));
            break;
          }
        } catch(e) {}
      }
    };
    loadData();
  }, [isLive, runId]);

  const simEvent = events.find(e => e.event_type === 'SIMULATION_RESULT');
  const totalAgents = simEvent?.payload?.total_agents || simEvent?.payload?.num_personas || 30;
  const llmAgents = simEvent?.payload?.llm_agents || simEvent?.payload?.num_personas || 30;
  const lightweightAgents = simEvent?.payload?.lightweight_agents || 0;
  const sentiment = simEvent?.payload?.overall_sentiment || 0;
  const numRounds = simData?.rounds || simEvent?.payload?.num_rounds || 5;
  const concerns = simEvent?.payload?.key_concerns || [];
  const strengths = simEvent?.payload?.key_strengths || [];

  // Build post feed from simulation data
  const posts = [];
  if (simData?.rounds_data) {
    simData.rounds_data.forEach(rd => {
      (rd.posts || rd.messages || []).forEach(p => {
        posts.push({ ...p, round: rd.round_number });
      });
    });
  }

  const archetypeColors = { VC: '#eab308', vc: '#eab308', Journalist: '#3b82f6', journalist: '#3b82f6', 'Early Adopter': '#22c55e', early_adopter: '#22c55e', Competitor: '#ef4444', competitor: '#ef4444', Regulator: '#a855f7', regulator: '#a855f7', User: '#06b6d4', user: '#06b6d4', Skeptic: '#f97316', skeptic: '#f97316' };

  // Build archetype sentiment data from simulation rounds (last round if available)
  const archetypeSentiments = useMemo(() => {
    const result = {};
    if (simData?.rounds_data && simData.rounds_data.length > 0) {
      const lastRound = simData.rounds_data[simData.rounds_data.length - 1];
      if (lastRound.sentiment_by_archetype) {
        Object.entries(lastRound.sentiment_by_archetype).forEach(([key, val]) => {
          // Normalize key to title case for display
          const displayKey = key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
          result[displayKey] = val;
        });
      }
    }
    // Fallback: if no sim data, use zeroes
    if (Object.keys(result).length === 0) {
      ['VC', 'Journalist', 'Early Adopter', 'Skeptic', 'Competitor', 'Regulator'].forEach(a => {
        result[a] = 0;
      });
    }
    return result;
  }, [simData]);

  return (
    <div>
      {/* Top bar */}
      <div className="flex items-center justify-between mb-4 p-3 rounded-xl bg-slate-800/30 border border-slate-700/20">
        <div className="flex items-center gap-4">
          <h2 className="text-lg font-bold text-white">Market Stress Test</h2>
          <span className="text-xs px-2 py-0.5 rounded bg-cyan-500/20 text-cyan-400 mono">
            {llmAgents} LLM + {lightweightAgents.toLocaleString()} Lightweight Agents
          </span>
        </div>
        <div className="flex items-center gap-4">
          <span className="text-xs text-slate-400">Rounds: <span className="text-white font-bold">{numRounds}</span></span>
          <span className={`text-xs ${sentiment > 0 ? 'text-green-400' : 'text-red-400'}`}>
            Sentiment: <span className="font-bold">{sentiment > 0 ? '+' : ''}{sentiment.toFixed(2)}</span>
          </span>
        </div>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 arena-grid">
        {/* Left: Post feed */}
        <div className="bg-slate-900/50 rounded-xl border border-slate-700/20 p-3 max-h-96 overflow-y-auto">
          <h3 className="text-xs font-semibold text-slate-500 uppercase mb-2">Agent Posts</h3>
          {posts.length > 0 ? posts.slice(0, 30).map((p, i) => {
            const archColor = archetypeColors[p.archetype] || '#6b7280';
            return (
              <div key={i} className="mb-2 p-2 rounded-lg bg-slate-800/30 border border-slate-700/10">
                <div className="flex items-center gap-1.5 mb-1">
                  <span className="w-2 h-2 rounded-full" style={{backgroundColor: archColor}}></span>
                  <span className="text-[10px] font-semibold" style={{color: archColor}}>{p.persona || p.name || 'Agent'}</span>
                  <span className="text-[9px] text-slate-600">R{p.round}</span>
                </div>
                <p className="text-[10px] text-slate-400 leading-relaxed">{(p.content || p.text || '').substring(0, 120)}</p>
              </div>
            );
          }) : (
            <div className="text-xs text-slate-600">
              {concerns.length > 0 ? concerns.map((c, i) => (
                <div key={i} className="mb-2 p-2 rounded bg-slate-800/20"><span className="text-red-400">●</span> {c}</div>
              )) : 'No simulation data available. Run the pipeline first.'}
            </div>
          )}
        </div>

        {/* Center: Globe embed */}
        <div className="bg-slate-900/50 rounded-xl border border-slate-700/20 overflow-hidden relative globe-container" style={{minHeight: '320px'}}>
          <iframe src="globe.html" className="w-full h-full absolute inset-0 border-0"
            style={{minHeight: '320px', background: 'transparent'}} loading="lazy" title="Market simulation globe"></iframe>
          <div className="absolute top-2 left-2 right-2 flex justify-between items-center">
            <span className="text-[9px] px-1.5 py-0.5 rounded bg-black/60 text-cyan-400 mono backdrop-blur">
              {totalAgents.toLocaleString()} agents
            </span>
          </div>
        </div>

        {/* Right: Sentiment charts */}
        <div className="space-y-3">
          <div className="bg-slate-900/50 rounded-xl border border-slate-700/20 p-3">
            <h3 className="text-xs font-semibold text-slate-500 uppercase mb-2">Sentiment by Archetype</h3>
            {Object.entries(archetypeSentiments).map(([arch, val]) => {
              return (
                <div key={arch} className="flex items-center gap-2 mb-1.5">
                  <span className="text-[10px] w-20 text-slate-400 truncate">{arch}</span>
                  <div className="flex-1 h-2 bg-slate-800 rounded-full overflow-hidden">
                    <div className="h-full rounded-full transition-all"
                      style={{
                        width: `${Math.abs(val) * 50 + 10}%`,
                        backgroundColor: val > 0.2 ? '#22c55e' : val > -0.2 ? '#eab308' : '#ef4444',
                        marginLeft: val < 0 ? 'auto' : 0,
                      }}></div>
                  </div>
                  <span className="text-[9px] mono w-8 text-right" style={{ color: val > 0.2 ? '#22c55e' : val > -0.2 ? '#eab308' : '#ef4444' }}>
                    {val > 0 ? '+' : ''}{val.toFixed(1)}
                  </span>
                </div>
              );
            })}
          </div>
          <div className="bg-slate-900/50 rounded-xl border border-slate-700/20 p-3">
            <h3 className="text-xs font-semibold text-slate-500 uppercase mb-2">Key Strengths</h3>
            {strengths.slice(0, 4).map((s, i) => (
              <div key={i} className="text-[10px] text-green-400 mb-1">✓ {s}</div>
            ))}
            {strengths.length === 0 && <div className="text-[10px] text-slate-600">No data yet</div>}
          </div>
          <div className="bg-slate-900/50 rounded-xl border border-slate-700/20 p-3">
            <h3 className="text-xs font-semibold text-slate-500 uppercase mb-2">Key Concerns</h3>
            {concerns.slice(0, 4).map((c, i) => (
              <div key={i} className="text-[10px] text-red-400 mb-1">! {c}</div>
            ))}
            {concerns.length === 0 && <div className="text-[10px] text-slate-600">No data yet</div>}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Boardroom View (Screen 2) ──
function BoardroomView({ events, liveDiscussion, isLive, runId }) {
  const [discussion, setDiscussion] = useState([]);
  const [playIndex, setPlayIndex] = useState(0);

  // If we got live discussion data from parent (via WebSocket or API), use it
  useEffect(() => {
    if (liveDiscussion && liveDiscussion.length > 0) {
      setDiscussion(liveDiscussion);
      return;
    }
  }, [liveDiscussion]);

  useEffect(() => {
    if (liveDiscussion && liveDiscussion.length > 0) return; // Already handled above

    const paths = [];
    // If live with a runId, try the run-scoped endpoint first
    if (isLive && runId) {
      paths.push(`${API_BASE}/api/runs/${runId}/board-discussion`);
    }
    paths.push('/api/board_discussion', '../outputs/board_discussion.json', 'board_discussion.json');

    const tryLoad = async () => {
      for (const p of paths) {
        try {
          const res = await fetch(p);
          if (res.ok) {
            const raw = await res.json();
            const d = raw.discussion || (Array.isArray(raw) ? raw : []);
            if (d.length > 0) { setDiscussion(d); return; }
          }
        } catch(e) {}
      }
      // Try embedded demo discussion data
      if (typeof DEMO_DISCUSSION !== 'undefined' && DEMO_DISCUSSION.length > 0) {
        setDiscussion(DEMO_DISCUSSION);
        return;
      }
      // Last resort: build from trace events
      const d = events
        .filter(e => ['STRATEGY_SET','BLOCKER','PIVOT','SIMULATION_RESULT'].includes(e.event_type) ||
                     (e.payload?.action && ['strategy','pivot','blocker_found','compliance_scan','financial_model','gtm_generate','codex_generate','pivot_response','simulation_review'].includes(e.payload.action)))
        .map(e => ({
          agent: e.source,
          timestamp: e.timestamp,
          event_type: e.payload?.action || e.event_type?.toLowerCase(),
          message: e.payload?.details || e.payload?.description || e.payload?.reason || e.payload?.startup_idea || 'Processing...',
          reasoning: e.payload?.details || '',
          iteration: e.iteration || 1,
        }));
      setDiscussion(d);
    };
    tryLoad();
  }, [events, isLive, runId]);

  // When discussion updates: in live mode auto-advance to latest entry, otherwise clamp
  useEffect(() => {
    if (isLive && discussion.length > 0) {
      setPlayIndex(discussion.length - 1);
    } else {
      setPlayIndex(Math.min(playIndex, discussion.length - 1));
    }
  }, [discussion]);

  // Play sound when boardroom discussion step changes
  const prevBoardIdx = useRef(-1);
  useEffect(() => {
    if (prevBoardIdx.current === playIndex) return;
    prevBoardIdx.current = playIndex;
    const entry = discussion[playIndex];
    if (!entry) return;
    const et = (entry.event_type || '').toLowerCase();
    if (et.includes('blocker')) audioManager.play('blocker');
    else if (et.includes('pivot')) audioManager.play('pivot');
    else audioManager.play('sim_tick');
  }, [playIndex, discussion]);

  const current = discussion[playIndex];
  const agents = ['CEO', 'CTO', 'CFO', 'CMO', 'Legal'];
  const agentCfg = {
    CEO: { icon: '👑', title: 'CEO', color: '#eab308', x: 50, y: 8 },
    CTO: { icon: '💻', title: 'CTO', color: '#3b82f6', x: 12, y: 45 },
    Legal: { icon: '🛡️', title: 'Legal', color: '#ef4444', x: 88, y: 45 },
    CMO: { icon: '🚀', title: 'CMO', color: '#a855f7', x: 22, y: 82 },
    CFO: { icon: '📊', title: 'CFO', color: '#22c55e', x: 78, y: 82 },
  };

  const getState = (agent) => {
    if (!current) return 'idle';
    if (current.agent === agent) {
      const et = (current.event_type || '').toLowerCase();
      if (et.includes('blocker')) return 'blocked';
      if (et.includes('pivot')) return 'pivot';
      return 'working';
    }
    // Check if this agent has completed at any prior step
    const agentEntries = discussion.slice(0, playIndex + 1).filter(d => d.agent === agent);
    if (agentEntries.length > 0) {
      const lastEntry = agentEntries[agentEntries.length - 1];
      const lastIdx = discussion.indexOf(lastEntry);
      if (lastIdx < playIndex) return 'done';
    }
    return 'idle';
  };

  // Determine connection line state based on current discussion step
  const getConnectionState = () => {
    if (!current) return 'idle';
    const et = (current.event_type || '').toLowerCase();
    if (et.includes('blocker')) return 'blocker';
    if (et.includes('pivot')) return 'pivot';
    return 'active';
  };

  const connectionState = getConnectionState();

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <h2 className="text-xl font-bold text-white">The Boardroom</h2>
        <div className="flex items-center gap-2">
          <button onClick={() => setPlayIndex(Math.max(0, playIndex - 1))} className="px-2 py-1 rounded text-xs bg-white/5 hover:bg-white/10 text-slate-400">◀</button>
          <span className="text-xs text-slate-500 mono">{playIndex + 1}/{discussion.length}</span>
          <button onClick={() => setPlayIndex(Math.min(discussion.length - 1, playIndex + 1))} className="px-2 py-1 rounded text-xs bg-white/5 hover:bg-white/10 text-slate-400">▶</button>
        </div>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        {/* Agent circle - desktop: absolute positioned, mobile: flex wrap */}
        <div className="relative bg-slate-900/50 rounded-xl border border-slate-700/20 p-4 boardroom-agents boardroom-agents-desktop" style={{minHeight: '320px'}}>
          {/* SVG connection lines between agents */}
          <svg className="absolute inset-0 w-full h-full pointer-events-none" viewBox="0 0 100 100" preserveAspectRatio="none" style={{zIndex: 0}}>
            {(() => {
              const connections = [
                ['CEO', 'CTO'], ['CEO', 'Legal'], ['CEO', 'CMO'], ['CEO', 'CFO'],
                ['CTO', 'CMO'], ['Legal', 'CFO'], ['CMO', 'CFO'],
              ];
              return connections.map(([a, b], idx) => {
                const ca = agentCfg[a];
                const cb = agentCfg[b];
                const isSource = current && (current.agent === a || current.agent === b);
                let strokeColor = 'rgba(71,85,105,0.3)';
                let strokeWidth = 0.3;
                let dashArray = '';
                if (isSource && connectionState === 'blocker') {
                  strokeColor = '#ef4444';
                  strokeWidth = 0.6;
                } else if (isSource && connectionState === 'pivot') {
                  strokeColor = '#eab308';
                  strokeWidth = 0.6;
                  dashArray = '2 1';
                } else if (isSource && connectionState === 'active') {
                  strokeColor = 'rgba(99,102,241,0.6)';
                  strokeWidth = 0.4;
                }
                return (
                  <line key={idx}
                    x1={ca.x} y1={ca.y}
                    x2={cb.x} y2={cb.y}
                    stroke={strokeColor}
                    strokeWidth={strokeWidth}
                    strokeDasharray={dashArray}
                    style={{
                      transition: 'all 0.4s ease',
                      filter: isSource && connectionState !== 'idle'
                        ? `drop-shadow(0 0 1px ${connectionState === 'blocker' ? '#ef4444' : connectionState === 'pivot' ? '#eab308' : '#6366f1'})`
                        : 'none',
                    }}
                  />
                );
              });
            })()}
            {/* Animated traveling dot along active connection */}
            {current && (() => {
              const src = agentCfg[current.agent];
              if (!src) return null;
              const targets = current.agent === 'CEO' ? ['CTO','Legal','CMO','CFO'] :
                              current.agent === 'Legal' ? ['CEO','CFO'] :
                              [current.agent === 'CTO' ? 'CMO' : 'CEO'];
              return targets.map((tgt, idx) => {
                const dst = agentCfg[tgt];
                if (!dst) return null;
                const dotColor = connectionState === 'blocker' ? '#ef4444' : connectionState === 'pivot' ? '#eab308' : '#6366f1';
                return (
                  <circle key={`dot-${idx}`} r="1" fill={dotColor} style={{ filter: `drop-shadow(0 0 1px ${dotColor})` }}>
                    <animateMotion dur={`${1.2 + idx * 0.3}s`} repeatCount="indefinite"
                      path={`M${src.x} ${src.y} L${dst.x} ${dst.y}`}
                      keyPoints="0;1" keyTimes="0;1" calcMode="linear" />
                  </circle>
                );
              });
            })()}
          </svg>

          {agents.map(name => {
            const cfg = agentCfg[name];
            const state = getState(name);
            const borderColor = state === 'blocked' ? '#ef4444' : state === 'pivot' ? '#eab308' : state === 'working' ? cfg.color : state === 'done' ? '#22c55e' : '#334155';
            const glowStyle = state !== 'idle' ? { boxShadow: `0 0 20px ${borderColor}40` } : {};

            // Map state to CSS class for the status dot
            const statusDotClass = {
              idle: 'status-dot-idle',
              working: 'status-dot-working',
              done: 'status-dot-done',
              blocked: 'status-dot-blocked',
              pivot: 'status-dot-working', // pivot uses yellow working glow
            }[state] || 'status-dot-idle';

            return (
              <div key={name} className="absolute flex flex-col items-center agent-card-wrap" style={{ left: `${cfg.x}%`, top: `${cfg.y}%`, transform: 'translate(-50%, -50%)', zIndex: 1 }}>
                <div className={`agent-card-boardroom rounded-xl border-2 p-3 text-center transition-all duration-500 ${state !== 'idle' ? 'scale-105' : ''}`}
                  style={{ borderColor, backgroundColor: cfg.color + '10', ...glowStyle, width: '90px' }}>
                  <div className="text-2xl mb-0.5">{cfg.icon}</div>
                  <div className="text-xs font-bold" style={{ color: cfg.color }}>{name}</div>
                  <div className={`w-3 h-3 rounded-full mx-auto mt-1 relative ${statusDotClass}`}
                    style={state === 'pivot' ? { backgroundColor: '#eab308', boxShadow: '0 0 8px rgba(234,179,8,0.5)' } : {}}></div>
                  <div className="text-[8px] mt-0.5 uppercase tracking-wider" style={{
                    color: state === 'blocked' ? '#ef4444' : state === 'working' ? '#22c55e' : state === 'pivot' ? '#eab308' : state === 'done' ? '#22c55e' : '#475569'
                  }}>{state}</div>
                </div>
                {current && current.agent === name && (
                  <div className="absolute top-full mt-2 w-40 p-2 rounded-lg bg-black/80 border border-white/10 text-[10px] text-slate-300 leading-relaxed z-10 detail-panel-enter">
                    {(current.message || '').substring(0, 80)}...
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* Discussion feed */}
        <div className="bg-slate-900/50 rounded-xl border border-slate-700/20 p-4 max-h-80 overflow-y-auto">
          <h3 className="text-sm font-semibold text-slate-400 mb-3">Discussion</h3>
          {discussion.slice(0, playIndex + 1).map((entry, i) => {
            const cfg = agentCfg[entry.agent] || agentCfg.CEO;
            const isCurrent = i === playIndex;
            return (
              <div key={i} onClick={() => setPlayIndex(i)}
                className={`p-2 mb-2 rounded-lg border cursor-pointer transition-colors ${isCurrent ? 'border-indigo-500/30 bg-indigo-500/5' : 'border-transparent hover:border-slate-700/30'}`}>
                <div className="flex items-center gap-1.5 mb-1">
                  <span className="text-sm">{cfg.icon}</span>
                  <span className="text-xs font-semibold" style={{ color: cfg.color }}>{entry.agent}</span>
                  {(() => {
                    const et = (entry.event_type || '').toLowerCase();
                    let badgeClass = 'bg-white/5 text-slate-500';
                    if (et.includes('blocker')) badgeClass = 'bg-red-500/20 text-red-400 font-bold';
                    else if (et.includes('pivot')) badgeClass = 'bg-yellow-500/20 text-yellow-400 font-bold';
                    else if (et.includes('strategy')) badgeClass = 'bg-blue-500/20 text-blue-400';
                    else if (et.includes('codex') || et.includes('prototype')) badgeClass = 'bg-cyan-500/20 text-cyan-400';
                    else if (et.includes('financial')) badgeClass = 'bg-green-500/20 text-green-400';
                    else if (et.includes('gtm') || et.includes('positioning')) badgeClass = 'bg-purple-500/20 text-purple-400';
                    else if (et.includes('compliance') || et.includes('industry')) badgeClass = 'bg-orange-500/20 text-orange-400';
                    return <span className={`text-[9px] px-1.5 py-0.5 rounded ${badgeClass}`}>{et.toUpperCase()}</span>;
                  })()}
                  {entry.iteration && <span className="text-[8px] text-slate-600 mono">iter {entry.iteration}</span>}
                </div>
                <p className="text-[11px] text-slate-300 leading-relaxed">{(entry.message || '').substring(0, 180)}{entry.message?.length > 180 ? '...' : ''}</p>
                {entry.reasoning && entry.reasoning !== entry.message && (
                  <p className="text-[10px] text-slate-500 leading-relaxed mt-0.5 italic">{(entry.reasoning || '').substring(0, 120)}{entry.reasoning?.length > 120 ? '...' : ''}</p>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── Pivot Flow Animated Sequence ──
function PivotFlow({ events }) {
  const [step, setStep] = useState(0);
  const [isPlaying, setIsPlaying] = useState(false);
  const timerRef = useRef(null);
  const [discussion, setDiscussion] = useState([]);

  useEffect(() => {
    const paths = ['/api/board_discussion', '../outputs/board_discussion.json', 'board_discussion.json'];
    const tryLoad = async () => {
      for (const p of paths) {
        try {
          const res = await fetch(p);
          if (res.ok) {
            const raw = await res.json();
            const d = raw.discussion || (Array.isArray(raw) ? raw : []);
            if (d.length > 0) { setDiscussion(d); return; }
          }
        } catch(e) {}
      }
      // Fallback to embedded demo discussion
      if (typeof DEMO_DISCUSSION !== 'undefined' && DEMO_DISCUSSION.length > 0) {
        setDiscussion(DEMO_DISCUSSION);
      }
    };
    tryLoad();
  }, []);

  // Build the animated sequence steps
  const sequence = useMemo(() => {
    const steps = [];
    const simEvents = events.filter(e => e.event_type === 'SIMULATION_RESULT');
    const pivotEvents = events.filter(e => e.event_type === 'PIVOT');
    const blockerEvents = events.filter(e => e.event_type === 'BLOCKER');

    // For each pivot, build the causal chain
    pivotEvents.forEach((pivot, pi) => {
      const triggeredBy = pivot.triggered_by;
      const trigger = events.find(e => e.event_id === triggeredBy);

      // Step 1: The trigger (blocker or simulation)
      if (trigger) {
        if (trigger.event_type === 'BLOCKER') {
          steps.push({
            type: 'trigger',
            label: 'Regulatory Blocker',
            icon: '🛡️',
            source: trigger.source || 'Legal',
            color: '#ef4444',
            content: trigger.payload?.description || 'Compliance blocker detected',
            detail: `Severity: ${trigger.payload?.severity || 'HIGH'}`,
            citations: trigger.payload?.citations || [],
          });
        } else if (trigger.event_type === 'SIMULATION_RESULT') {
          const concerns = trigger.payload?.key_concerns || [];
          steps.push({
            type: 'trigger',
            label: 'Market Signal',
            icon: '📊',
            source: 'Simulation',
            color: '#06b6d4',
            content: `Sentiment: ${(trigger.payload?.overall_sentiment || 0).toFixed(2)} | ${concerns.length} concerns flagged`,
            detail: concerns.slice(0, 3).join(', '),
            citations: [],
          });
        }
      }

      // Step 2: Signal aggregation
      steps.push({
        type: 'signal',
        label: 'Signal Aggregation',
        icon: '🔍',
        source: 'System',
        color: '#a855f7',
        content: `Analyzing ${trigger?.event_type === 'SIMULATION_RESULT' ? 'market feedback' : 'regulatory risk'} for strategic impact...`,
        detail: `Pivot recommended: Yes | Confidence: ${(trigger?.payload?.confidence || 0.8).toFixed(2)}`,
        citations: [],
      });

      // Step 3: CEO reasoning
      const ceoDiscussion = discussion.filter(d => d.agent === 'CEO' && (d.event_type || '').includes('pivot'));
      const ceoReasoning = ceoDiscussion.length > 0 ? ceoDiscussion[ceoDiscussion.length - 1] : null;
      const pr = parsePivotReason(pivot.payload?.reason);
      steps.push({
        type: 'ceo',
        label: 'CEO Decision',
        icon: '👑',
        source: 'CEO',
        color: '#eab308',
        content: pr.summary || 'Strategic pivot decision',
        detail: pr.chosen ? `Decision: ${pr.chosen}. ${pr.rationale || ''}` : (ceoReasoning?.reasoning || `Pivot #${pi + 1}: Adjusting strategy to address ${trigger?.event_type === 'BLOCKER' ? 'compliance risk' : 'market feedback'}`),
        citations: [],
      });

      // Step 4: Agent impact
      const changes = filterAgentChanges(pivot.payload?.changes_required || {});
      const affected = pivot.payload?.affected_agents || Object.keys(changes);
      const agentIcons = { CTO: '💻', CFO: '📊', CMO: '🚀', Legal: '🛡️' };
      const agentColors = { CTO: '#3b82f6', CFO: '#22c55e', CMO: '#a855f7', Legal: '#ef4444' };

      affected.forEach(agent => {
        steps.push({
          type: 'agent',
          label: `${agent} Adapts`,
          icon: agentIcons[agent] || '⚙️',
          source: agent,
          color: agentColors[agent] || '#6366f1',
          content: changes[agent] || `${agent} adjusting to new strategy`,
          detail: '',
          citations: [],
        });
      });

      // Step 5: New strategy
      steps.push({
        type: 'result',
        label: 'New Strategy',
        icon: '🎯',
        source: 'CEO',
        color: '#22c55e',
        content: (() => {
          try { return JSON.parse(pivot.payload?.new_strategy || '{}').startup_idea || 'Updated strategy'; }
          catch(e) { return pivot.payload?.new_strategy || 'Updated strategy'; }
        })(),
        detail: 'All agents aligned on new direction',
        citations: [],
      });
    });

    // If no pivots, show a simple flow
    if (steps.length === 0) {
      steps.push(
        { type: 'trigger', label: 'Strategy Set', icon: '🎯', source: 'CEO', color: '#eab308', content: 'Initial strategy defined', detail: '', citations: [] },
        { type: 'signal', label: 'Analysis', icon: '🔍', source: 'System', color: '#a855f7', content: 'Evaluating regulatory and market landscape...', detail: '', citations: [] },
        { type: 'result', label: 'No Pivot Needed', icon: '✅', source: 'System', color: '#22c55e', content: 'Strategy validated - proceeding to execution', detail: '', citations: [] },
      );
    }

    return steps;
  }, [events, discussion]);

  // Auto-play using requestAnimationFrame instead of setInterval
  useEffect(() => {
    if (!isPlaying) return;
    let lastTime = 0;
    let rafId = null;
    const STEP_INTERVAL = 2000; // ms between steps

    const tick = (timestamp) => {
      if (!lastTime) lastTime = timestamp;
      if (timestamp - lastTime >= STEP_INTERVAL) {
        lastTime = timestamp;
        setStep(s => {
          if (s >= sequence.length - 1) { setIsPlaying(false); return s; }
          return s + 1;
        });
      }
      rafId = requestAnimationFrame(tick);
    };
    rafId = requestAnimationFrame(tick);
    return () => { if (rafId) cancelAnimationFrame(rafId); };
  }, [isPlaying, sequence.length]);

  const currentStep = sequence[step] || sequence[0];

  // Play sound on step change
  const prevStepRef = useRef(-1);
  useEffect(() => {
    if (prevStepRef.current === step) return;
    prevStepRef.current = step;
    const s = sequence[step];
    if (!s) return;
    if (s.type === 'trigger' && s.color === '#ef4444') audioManager.play('blocker');
    else if (s.type === 'ceo') audioManager.play('pivot');
    else if (s.type === 'result') audioManager.play('agent_complete');
    else if (s.type === 'signal') audioManager.play('sim_tick');
    else if (s.type === 'agent') audioManager.play('sim_tick');
    else audioManager.play('tab_switch');
  }, [step, sequence]);

  return (
    <div>
      <div className="flex items-center justify-between mb-6 flex-wrap gap-2 pivot-flow-controls">
        <h2 className="text-xl font-bold text-white">Pivot Flow</h2>
        <div className="flex items-center gap-2 flex-wrap">
          <button onClick={() => setStep(s => Math.max(0, s - 1))}
            className="px-3 py-1.5 rounded text-xs bg-white/5 hover:bg-white/10 text-slate-400">&#9664; Prev</button>
          <button onClick={() => setIsPlaying(!isPlaying)}
            className={`px-4 py-1.5 rounded text-xs font-semibold ${isPlaying ? 'bg-red-500/20 text-red-400' : 'bg-indigo-500/20 text-indigo-400'}`}>
            {isPlaying ? '⏸ Pause' : '▶ Play'}
          </button>
          <button onClick={() => setStep(s => Math.min(sequence.length - 1, s + 1))}
            className="px-3 py-1.5 rounded text-xs bg-white/5 hover:bg-white/10 text-slate-400">Next &#9654;</button>
          <span className="text-xs text-slate-500 ml-2">Step {step + 1}/{sequence.length}</span>
        </div>
      </div>

      {/* Progress bar */}
      <div className="flex gap-1 mb-6">
        {sequence.map((s, i) => (
          <button key={i} onClick={() => setStep(i)}
            className={`flex-1 h-2 rounded-full transition-all ${i <= step ? 'opacity-100' : 'opacity-20'}`}
            style={{ backgroundColor: s.color }}
          ></button>
        ))}
      </div>

      {/* Animated step display */}
      <div className="relative">
        {/* Arrow trail */}
        <div className="flex items-center gap-2 mb-4 overflow-x-auto pb-2 pivot-trail">
          {sequence.slice(0, step + 1).map((s, i) => (
            <React.Fragment key={i}>
              <div onClick={() => setStep(i)}
                className={`flex-shrink-0 flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs cursor-pointer transition-all pivot-trail-node ${i === step ? 'ring-2 ring-white/20 scale-105' : 'opacity-60'}`}
                style={{ backgroundColor: s.color + '20', color: s.color, borderColor: s.color }}>
                <span>{s.icon}</span>
                <span className="font-medium">{s.label}</span>
              </div>
              {i < step && <span className="text-slate-600 flex-shrink-0">→</span>}
            </React.Fragment>
          ))}
        </div>

        {/* Main content card */}
        <div className="rounded-xl border p-6 transition-all duration-500"
          style={{ borderColor: currentStep.color + '40', backgroundColor: currentStep.color + '08' }}>
          <div className="flex items-start gap-4">
            <div className="text-4xl">{currentStep.icon}</div>
            <div className="flex-1">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-lg font-bold" style={{ color: currentStep.color }}>{currentStep.label}</span>
                <span className="text-xs px-2 py-0.5 rounded-full bg-white/5 text-slate-400">{currentStep.source}</span>
              </div>
              <p className="text-slate-300 text-sm leading-relaxed mb-2">{currentStep.content}</p>
              {currentStep.detail && (
                <p className="text-slate-500 text-xs leading-relaxed italic border-l-2 pl-3 mt-2"
                  style={{ borderColor: currentStep.color + '40' }}>
                  {currentStep.detail}
                </p>
              )}
              {currentStep.citations && currentStep.citations.length > 0 && (
                <div className="mt-3">
                  <span className="text-xs text-slate-500">Citations:</span>
                  {currentStep.citations.map((c, ci) => (
                    <a key={ci} href={c} target="_blank" rel="noopener noreferrer"
                      className="block text-xs text-indigo-400 hover:text-indigo-300 truncate mt-1">{c}</a>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>

        {/* Arrow to next */}
        {step < sequence.length - 1 && (
          <div className="flex justify-center my-3">
            <div className="text-slate-600 text-2xl animate-bounce">↓</div>
          </div>
        )}

        {/* Preview of next step */}
        {step < sequence.length - 1 && (
          <div className="rounded-xl border border-slate-700/20 bg-slate-800/20 p-4 opacity-40 cursor-pointer hover:opacity-60 transition-opacity"
            onClick={() => setStep(step + 1)}>
            <div className="flex items-center gap-2">
              <span className="text-xl">{sequence[step + 1].icon}</span>
              <span className="text-sm text-slate-400">{sequence[step + 1].label}</span>
              <span className="text-xs text-slate-600">Click or press Next to continue</span>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Advanced Charts ──
function AdvancedCharts({ events }) {
  const sankeyRef = useRef(null);
  const radarRef = useRef(null);
  const radarInstance = useRef(null);
  const waterfallRef = useRef(null);
  const waterfallInstance = useRef(null);
  const heatmapRef = useRef(null);
  const windowSize = useWindowSize();

  // Sankey diagram using D3 - redraws on resize
  useEffect(() => {
    if (!sankeyRef.current || events.length === 0 || typeof d3 === 'undefined' || typeof d3.sankey === 'undefined') return;
    const container = sankeyRef.current;
    container.innerHTML = '';

    const width = container.clientWidth || 600;
    const height = 300;

    // Build Sankey nodes and links from event flow
    const nodeNames = ['Concept', 'Strategy', 'CTO Build', 'CFO Model', 'CMO GTM', 'Legal Scan', 'Blockers', 'Pivot', 'Simulation', 'Rebuild', 'Final'];
    const nodes = nodeNames.map(name => ({ name }));
    const nodeIndex = Object.fromEntries(nodeNames.map((n, i) => [n, i]));

    const stratCount = events.filter(e => e.event_type === 'STRATEGY_SET').length;
    const buildCount = events.filter(e => e.source === 'CTO').length;
    const cfoCount = events.filter(e => e.source === 'CFO').length;
    const cmoCount = events.filter(e => e.source === 'CMO').length;
    const legalCount = events.filter(e => e.source === 'Legal').length;
    const blockerCount = events.filter(e => e.event_type === 'BLOCKER').length;
    const pivotCount = events.filter(e => e.event_type === 'PIVOT').length;
    const simCount = events.filter(e => e.event_type === 'SIMULATION_RESULT').length;

    const links = [
      { source: nodeIndex['Concept'], target: nodeIndex['Strategy'], value: Math.max(stratCount, 1) },
      { source: nodeIndex['Strategy'], target: nodeIndex['CTO Build'], value: Math.max(buildCount, 1) },
      { source: nodeIndex['Strategy'], target: nodeIndex['CFO Model'], value: Math.max(cfoCount, 1) },
      { source: nodeIndex['Strategy'], target: nodeIndex['CMO GTM'], value: Math.max(cmoCount, 1) },
      { source: nodeIndex['Strategy'], target: nodeIndex['Legal Scan'], value: Math.max(legalCount, 1) },
      { source: nodeIndex['Legal Scan'], target: nodeIndex['Blockers'], value: Math.max(blockerCount, 1) },
      { source: nodeIndex['Blockers'], target: nodeIndex['Pivot'], value: Math.max(pivotCount, 1) },
      { source: nodeIndex['Pivot'], target: nodeIndex['Simulation'], value: Math.max(simCount, 1) },
      { source: nodeIndex['Simulation'], target: nodeIndex['Rebuild'], value: Math.max(pivotCount, 1) },
      { source: nodeIndex['Rebuild'], target: nodeIndex['Final'], value: Math.max(1, 1) },
    ];

    const svg = d3.select(container).append('svg')
      .attr('width', width).attr('height', height)
      .attr('viewBox', `0 0 ${width} ${height}`)
      .style('max-width', '100%').style('height', 'auto');
    const sankey = d3.sankey().nodeWidth(15).nodePadding(10).extent([[1, 5], [width - 1, height - 5]]);
    const { nodes: sNodes, links: sLinks } = sankey({ nodes: nodes.map(d => ({...d})), links: links.map(d => ({...d})) });

    const colorScale = d3.scaleOrdinal()
      .domain(nodeNames)
      .range(['#6366f1', '#3b82f6', '#3b82f6', '#22c55e', '#a855f7', '#ef4444', '#ef4444', '#eab308', '#06b6d4', '#22c55e', '#6366f1']);

    svg.append('g').selectAll('rect').data(sNodes).join('rect')
      .attr('x', d => d.x0).attr('y', d => d.y0)
      .attr('height', d => Math.max(d.y1 - d.y0, 2)).attr('width', d => d.x1 - d.x0)
      .attr('fill', d => colorScale(d.name)).attr('opacity', 0.9).attr('rx', 2);

    svg.append('g').attr('fill', 'none').selectAll('path').data(sLinks).join('path')
      .attr('d', d3.sankeyLinkHorizontal())
      .attr('stroke', d => colorScale(d.source.name)).attr('stroke-width', d => Math.max(d.width, 1.5))
      .attr('opacity', 0.35);

    svg.append('g').selectAll('text').data(sNodes).join('text')
      .attr('x', d => d.x0 < width / 2 ? d.x1 + 6 : d.x0 - 6)
      .attr('y', d => (d.y1 + d.y0) / 2).attr('dy', '0.35em')
      .attr('text-anchor', d => d.x0 < width / 2 ? 'start' : 'end')
      .text(d => d.name).attr('fill', '#94a3b8').attr('font-size', '10px');
  }, [events, windowSize.width]);

  // Radar chart - startup readiness
  useEffect(() => {
    if (!radarRef.current) return;
    if (radarInstance.current) radarInstance.current.destroy();

    const simEvent = events.find(e => e.event_type === 'SIMULATION_RESULT');
    const blockers = events.filter(e => e.event_type === 'BLOCKER').length;
    const sentiment = simEvent?.payload?.overall_sentiment || 0;

    const legal = Math.max(0, Math.min(100, 90 - blockers * 15));
    const market = Math.max(0, Math.min(100, 50 + sentiment * 40));
    const financial = events.some(e => e.event_type === 'FINANCIAL_MODEL_READY') ? 75 : 40;
    const tech = events.some(e => e.event_type === 'PROTOTYPE_READY') ? 85 : 45;
    const gtm = events.some(e => e.event_type === 'GTM_READY') ? 80 : 35;

    radarInstance.current = new Chart(radarRef.current, {
      type: 'radar',
      data: {
        labels: ['Legal Readiness', 'Market Fit', 'Financial Viability', 'Tech Feasibility', 'GTM'],
        datasets: [{
          label: 'Readiness %',
          data: [legal, market, financial, tech, gtm],
          backgroundColor: 'rgba(99,102,241,0.15)',
          borderColor: '#6366f1',
          pointBackgroundColor: '#6366f1',
          pointBorderColor: '#6366f1',
        }]
      },
      options: {
        responsive: true,
        scales: {
          r: { min: 0, max: 100, grid: { color: '#1e293b' }, angleLines: { color: '#1e293b' }, ticks: { display: false }, pointLabels: { color: '#94a3b8', font: { size: 11 } } }
        },
        plugins: { legend: { display: false } },
      }
    });
    return () => { if (radarInstance.current) radarInstance.current.destroy(); };
  }, [events]);

  // Cost waterfall
  useEffect(() => {
    if (!waterfallRef.current) return;
    if (waterfallInstance.current) waterfallInstance.current.destroy();

    const phases = ['Strategy', 'Legal', 'CTO', 'CFO', 'CMO', 'Simulation', 'Pivot'];
    const phaseTokens = phases.map(phase => {
      const key = phase === 'Strategy' ? 'CEO' : phase === 'Simulation' ? 'Simulation' : phase === 'Legal' ? 'Legal' : phase;
      return events.filter(e => e.source === key).length * 500; // Estimate tokens
    });

    waterfallInstance.current = new Chart(waterfallRef.current, {
      type: 'bar',
      data: {
        labels: phases,
        datasets: [{
          label: 'Est. Tokens',
          data: phaseTokens,
          backgroundColor: ['#eab308', '#ef4444', '#3b82f6', '#22c55e', '#a855f7', '#06b6d4', '#f97316'],
          borderRadius: 4,
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: { grid: { color: '#1e293b' }, ticks: { color: '#64748b' } },
          x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 10 } } }
        },
        plugins: { legend: { display: false } },
      }
    });
    return () => { if (waterfallInstance.current) waterfallInstance.current.destroy(); };
  }, [events]);

  // Agent activity heatmap using D3
  useEffect(() => {
    if (!heatmapRef.current || events.length === 0 || typeof d3 === 'undefined') return;
    const container = heatmapRef.current;
    container.innerHTML = '';

    const agents = ['CEO', 'CTO', 'CFO', 'CMO', 'Legal', 'Simulation'];
    const maxIter = Math.max(...events.map(e => e.iteration || 1), 1);
    const iterations = Array.from({ length: maxIter }, (_, i) => i + 1);

    const activityMap = {};
    events.forEach(e => {
      const key = `${e.source}-${e.iteration || 1}`;
      activityMap[key] = (activityMap[key] || 0) + 1;
    });

    const width = container.clientWidth || 500;
    const cellW = Math.min(60, (width - 80) / iterations.length);
    const cellH = 28;
    const margin = { top: 30, left: 80 };
    const height = margin.top + agents.length * cellH + 10;

    const svg = d3.select(container).append('svg')
      .attr('width', width).attr('height', height)
      .attr('viewBox', `0 0 ${width} ${height}`)
      .style('max-width', '100%').style('height', 'auto');

    const maxActivity = Math.max(...Object.values(activityMap), 1);
    const colorScale = d3.scaleSequential(d3.interpolateViridis).domain([0, maxActivity]);

    // Cells
    agents.forEach((agent, ai) => {
      iterations.forEach((iter, ii) => {
        const count = activityMap[`${agent}-${iter}`] || 0;
        svg.append('rect')
          .attr('x', margin.left + ii * cellW).attr('y', margin.top + ai * cellH)
          .attr('width', cellW - 2).attr('height', cellH - 2)
          .attr('fill', count > 0 ? colorScale(count) : '#0f172a')
          .attr('rx', 3).attr('opacity', 0.85);

        if (count > 0) {
          svg.append('text')
            .attr('x', margin.left + ii * cellW + cellW / 2 - 1)
            .attr('y', margin.top + ai * cellH + cellH / 2)
            .attr('dy', '0.35em').attr('text-anchor', 'middle')
            .text(count).attr('fill', '#fff').attr('font-size', '9px');
        }
      });
    });

    // Agent labels
    agents.forEach((agent, ai) => {
      svg.append('text')
        .attr('x', margin.left - 8).attr('y', margin.top + ai * cellH + cellH / 2)
        .attr('dy', '0.35em').attr('text-anchor', 'end')
        .text(agent).attr('fill', '#94a3b8').attr('font-size', '10px');
    });

    // Iteration labels
    iterations.forEach((iter, ii) => {
      svg.append('text')
        .attr('x', margin.left + ii * cellW + cellW / 2 - 1)
        .attr('y', margin.top - 8).attr('text-anchor', 'middle')
        .text(`P${iter}`).attr('fill', '#64748b').attr('font-size', '9px');
    });
  }, [events, windowSize.width]);

  return (
    <div>
      <h2 className="text-xl font-bold text-white mb-6">Advanced Analytics</h2>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6 analytics-grid">
        {/* Sankey */}
        <div className="rounded-xl bg-slate-800/30 border border-slate-700/20 p-4 md:col-span-2">
          <h3 className="text-sm font-semibold text-slate-400 mb-3">Event Flow (Sankey)</h3>
          <div ref={sankeyRef} style={{width:'100%', minHeight:'300px', overflow:'hidden'}}></div>
        </div>

        {/* Radar */}
        <div className="rounded-xl bg-slate-800/30 border border-slate-700/20 p-4">
          <h3 className="text-sm font-semibold text-slate-400 mb-3">Startup Readiness</h3>
          <canvas ref={radarRef}></canvas>
        </div>

        {/* Cost waterfall */}
        <div className="rounded-xl bg-slate-800/30 border border-slate-700/20 p-4">
          <h3 className="text-sm font-semibold text-slate-400 mb-3">Token Usage by Phase</h3>
          <canvas ref={waterfallRef}></canvas>
        </div>
      </div>

      {/* Activity heatmap */}
      <div className="rounded-xl bg-slate-800/30 border border-slate-700/20 p-4">
        <h3 className="text-sm font-semibold text-slate-400 mb-3">Agent Activity Heatmap</h3>
        <div ref={heatmapRef} style={{width:'100%', minHeight:'220px'}}></div>
      </div>
    </div>
  );
}

// ── Sentiment Dashboard ──

  const gaugeInstance = useRef(null);
  const archetypeRef = useRef(null);
  const archetypeInstance = useRef(null);

  const roundsInstance = useRef(null);

  const latestSim = simEvents.length > 0 ? simEvents[simEvents.length - 1] : null;

    const paths = ['/api/simulation/results', '../outputs/simulation_results.json', 'simulation_results.json'];
    const tryLoad = async () => {
      for (const p of paths) {
        try {
          const res = await fetch(p);
          if (res.ok) { setSimData(await res.json()); return; }
        } catch(e) {}
      }
      // Fallback to embedded demo simulation
      if (typeof DEMO_SIMULATION !== 'undefined') {
        setSimData(DEMO_SIMULATION);
      }

    tryLoad();
  }, []);

  useEffect(() => {
    if (!gaugeRef.current || !latestSim) return;
    if (gaugeInstance.current) gaugeInstance.current.destroy();
    const sentiment = latestSim.payload?.overall_sentiment || 0;
    const normalizedVal = (sentiment + 1) / 2; // 0 to 1
    gaugeInstance.current = new Chart(gaugeRef.current, {
      type: 'doughnut',
      data: {
        datasets: [{
          data: [normalizedVal, 1 - normalizedVal],
          backgroundColor: [
            sentiment > 0.3 ? '#22c55e' : sentiment > -0.3 ? '#eab308' : '#ef4444',
            'rgba(30,41,59,0.5)'
          ],
          borderWidth: 0,
        }]
      },
      options: {
        responsive: true, circumference: 180, rotation: 270, cutout: '80%',
        plugins: {
          legend: { display: false },
          tooltip: { enabled: false },
        }
      }
    });
    return () => { if (gaugeInstance.current) gaugeInstance.current.destroy(); };
  }, [latestSim]);

  // Archetype breakdown bar chart
  useEffect(() => {
    if (!archetypeRef.current) return;
    if (archetypeInstance.current) archetypeInstance.current.destroy();

    const archetypes = {};
    if (simData?.rounds_data) {
      simData.rounds_data.forEach(rd => {
        Object.entries(rd.sentiment_by_archetype || {}).forEach(([k, v]) => {
          if (!archetypes[k]) archetypes[k] = [];
          archetypes[k].push(v);
        });
      });
    }

    // If no sim data but have a sim event, use deterministic placeholder values
    const labels = Object.keys(archetypes);
    if (labels.length === 0 && latestSim) {
      const fallbackVals = { 'VC': 0.6, 'Journalist': -0.1, 'Early Adopter': 0.7, 'Skeptic': -0.3, 'Competitor': -0.5, 'Regulator': 0.1 };
      Object.entries(fallbackVals).forEach(([a, v]) => {
        archetypes[a] = [v];
      });
    }

    const rawLabels = Object.keys(archetypes);
    // Normalize labels to title case for display (e.g., "vc" -> "Vc", "early_adopter" -> "Early Adopter")
    const finalLabels = rawLabels.map(k => k.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()));
    const avgSentiments = rawLabels.map(k => {
      const vals = archetypes[k];
      return vals.reduce((a, b) => a + b, 0) / vals.length;
    });

    archetypeInstance.current = new Chart(archetypeRef.current, {
      type: 'bar',
      data: {
        labels: finalLabels,
        datasets: [{
          label: 'Avg Sentiment',
          data: avgSentiments,
          backgroundColor: avgSentiments.map(v => v > 0.2 ? 'rgba(34,197,94,0.6)' : v > -0.2 ? 'rgba(234,179,8,0.6)' : 'rgba(239,68,68,0.6)'),
          borderRadius: 6,
        }]
      },
      options: {
        indexAxis: 'y', responsive: true,
        scales: {
          x: { min: -1, max: 1, grid: { color: '#1e293b' }, ticks: { color: '#64748b' } },
          y: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 11 } } }
        },
        plugins: { legend: { display: false } },
      }
    });
    return () => { if (archetypeInstance.current) archetypeInstance.current.destroy(); };
  }, [simData, latestSim]);

  // Sentiment over rounds line chart
  useEffect(() => {
    if (!roundsRef.current) return;
    if (roundsInstance.current) roundsInstance.current.destroy();

    if (simData?.rounds_data && simData.rounds_data.length > 0) {
      const rounds = simData.rounds_data;
      const archetypes = {};
      rounds.forEach(rd => {
        Object.entries(rd.sentiment_by_archetype || {}).forEach(([k, v]) => {
          if (!archetypes[k]) archetypes[k] = [];
          archetypes[k].push(v);
        });
      });

      const archColors = ['#3b82f6', '#22c55e', '#eab308', '#ef4444', '#a855f7', '#06b6d4'];
      const datasets = Object.entries(archetypes).map(([name, vals], i) => ({
        label: name.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()),
        data: vals,
        borderColor: archColors[i % archColors.length],
        backgroundColor: 'transparent',
        tension: 0.3,
        pointRadius: 3,
      }));

      roundsInstance.current = new Chart(roundsRef.current, {
        type: 'line',
        data: { labels: rounds.map((_, i) => `Round ${i+1}`), datasets },
        options: {
          responsive: true,
          scales: {
            y: { min: -1, max: 1, grid: { color: '#1e293b' }, ticks: { color: '#64748b' } },
            x: { grid: { color: '#1e293b20' }, ticks: { color: '#64748b' } }
          },
          plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', padding: 10, font: { size: 10 } } } },
        }
      });
    } else {
      // Fallback: show overall sentiment from simEvents
      const data = simEvents.map(e => e.payload?.overall_sentiment || 0);
      roundsInstance.current = new Chart(roundsRef.current, {
        type: 'line',
        data: {
          labels: simEvents.map((_, i) => `Sim ${i+1}`),
          datasets: [{ label: 'Overall', data, borderColor: '#6366f1', backgroundColor: 'transparent', tension: 0.3 }]
        },
        options: {
          responsive: true,
          scales: {
            y: { min: -1, max: 1, grid: { color: '#1e293b' }, ticks: { color: '#64748b' } },
            x: { grid: { display: false }, ticks: { color: '#64748b' } }
          },
          plugins: { legend: { display: false } },
        }
      });
    }
    return () => { if (roundsInstance.current) roundsInstance.current.destroy(); };
  }, [simData, simEvents]);

  const sentiment = latestSim?.payload?.overall_sentiment || 0;
  const confidence = latestSim?.payload?.confidence || 0;
  const concerns = latestSim?.payload?.key_concerns || [];
  const strengths = latestSim?.payload?.key_strengths || [];
  const totalAgents = latestSim?.payload?.total_agents || latestSim?.payload?.num_personas || 0;

  return (
    <div>
      <h2 className="text-xl font-bold text-white mb-6">Market Sentiment Analysis</h2>

      {/* Top stats */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6 sentiment-stats-grid">
        <div className="rounded-xl bg-slate-800/50 border border-slate-700/30 p-4 text-center">
          <div className={`text-3xl font-bold ${sentiment > 0.3 ? 'text-green-400' : sentiment > -0.3 ? 'text-yellow-400' : 'text-red-400'}`}>{sentiment.toFixed(2)}</div>
          <div className="text-xs text-slate-500 mt-1">Overall Sentiment</div>
        </div>
        <div className="rounded-xl bg-slate-800/50 border border-slate-700/30 p-4 text-center">
          <div className="text-3xl font-bold text-indigo-400">{confidence.toFixed(2)}</div>
          <div className="text-xs text-slate-500 mt-1">Confidence</div>
        </div>
        <div className="rounded-xl bg-slate-800/50 border border-slate-700/30 p-4 text-center">
          <div className="text-3xl font-bold text-cyan-400">{totalAgents.toLocaleString()}</div>
          <div className="text-xs text-slate-500 mt-1">Total Agents</div>
        </div>
        <div className="rounded-xl bg-slate-800/50 border border-slate-700/30 p-4 text-center">
          <div className={`text-3xl font-bold ${latestSim?.payload?.pivot_recommended ? 'text-red-400' : 'text-green-400'}`}>
            {latestSim?.payload?.pivot_recommended ? 'Yes' : 'No'}
          </div>
          <div className="text-xs text-slate-500 mt-1">Pivot Recommended</div>
        </div>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
        {/* Gauge */}
        <div className="rounded-xl bg-slate-800/30 border border-slate-700/20 p-4">
          <h3 className="text-sm font-semibold text-slate-400 mb-3">Sentiment Gauge</h3>
          <div className="relative" style={{maxHeight: '180px'}}>
            <canvas ref={gaugeRef}></canvas>
            <div className="absolute bottom-2 left-1/2 -translate-x-1/2 text-center">
              <span className={`text-2xl font-bold ${sentiment > 0.3 ? 'text-green-400' : sentiment > -0.3 ? 'text-yellow-400' : 'text-red-400'}`}>
                {sentiment > 0.3 ? 'Positive' : sentiment > -0.3 ? 'Mixed' : 'Negative'}
              </span>
            </div>
          </div>
        </div>

        {/* Archetype breakdown */}
        <div className="rounded-xl bg-slate-800/30 border border-slate-700/20 p-4">
          <h3 className="text-sm font-semibold text-slate-400 mb-3">Sentiment by Archetype</h3>
          <canvas ref={archetypeRef}></canvas>
        </div>
      </div>

      {/* Sentiment over rounds */}
      <div className="rounded-xl bg-slate-800/30 border border-slate-700/20 p-4 mb-6">
        <h3 className="text-sm font-semibold text-slate-400 mb-3">Sentiment Over Rounds</h3>
        <canvas ref={roundsRef}></canvas>
      </div>

      {/* Key quotes - concerns and strengths */}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div className="rounded-xl bg-slate-800/30 border border-red-500/10 p-4">
          <h3 className="text-sm font-semibold text-red-400 mb-3">Key Concerns</h3>
          {concerns.length > 0 ? concerns.map((c, i) =>
            <div key={i} className="flex items-start gap-2 mb-2">
              <span className="text-red-500 mt-0.5">●</span>
              <span className="text-sm text-slate-300">{c}</span>
            </div>
          ) : <p className="text-sm text-slate-500">No concerns flagged</p>}
        </div>
        <div className="rounded-xl bg-slate-800/30 border border-green-500/10 p-4">
          <h3 className="text-sm font-semibold text-green-400 mb-3">Key Strengths</h3>
          {strengths.length > 0 ? strengths.map((s, i) =>
            <div key={i} className="flex items-start gap-2 mb-2">
              <span className="text-green-500 mt-0.5">●</span>
              <span className="text-sm text-slate-300">{s}</span>
            </div>
          ) : <p className="text-sm text-slate-500">No strengths noted</p>}
        </div>
      </div>
    </div>
  );
}

function MissionControl({ onLaunch, onNewSprint, isLive, sprintActive, activeConcept }) {
  const [concept, setConcept] = useState('');
  const [launching, setLaunching] = useState(false);
  const [launchError, setLaunchError] = useState('');
  const [sprintPhase, setSprintPhase] = useState(''); // '' | 'starting' | 'running' | 'done'

  const handleLaunch = async () => {
    setLaunchError('');
    audioManager.play('launch');
    setLaunching(true);

    if (isLive && concept.trim()) {
      // Live mode: POST to the API
      setSprintPhase('starting');
      const result = await liveConn.startSprint(concept.trim());
      if (result) {
        setSprintPhase('running');
        // Wait a moment for the warp animation then switch to dashboard
        setTimeout(() => {
          audioManager.play('sprint_complete');
          onLaunch(concept, result.run_id);
        }, 1200);
        return;
      } else {
        setLaunchError('Failed to start sprint. Check that the server is running.');
        setLaunching(false);
        setSprintPhase('');
        return;
      }
    }

    // Offline/demo mode: just transition to dashboard with demo data
    setTimeout(() => {
      audioManager.play('sprint_complete');
      onLaunch(concept);
    }, 1200);
  };

  const handleNewSprintClick = () => {
    setConcept('');
    setLaunching(false);
    setLaunchError('');
    setSprintPhase('');

  };

  // Determine displayed concept

  return (

// ── Main App ──
function App() {
  const [events, setEvents] = useState([]);
  const [activeTab, setActiveTab] = useState('timeline');
  const [loading, setLoading] = useState(true);
  const [screen, setScreen] = useState('mission-control');
  const [tabTransition, setTabTransition] = useState('screen-enter');
  const [renderedTab, setRenderedTab] = useState('timeline');
  const [isLive, setIsLive] = useState(false);
  const [liveStatus, setLiveStatus] = useState('disconnected');
  const [liveRunId, setLiveRunId] = useState(null);
  const [liveDiscussion, setLiveDiscussion] = useState(null);
  const [liveSimulation, setLiveSimulation] = useState(null);
  const [wsEvents, setWsEvents] = useState([]); // Real-time events from WebSocket

  // On mount: check if API server is reachable
  useEffect(() => {
    const init = async () => {
      const connected = await liveConn.tryConnect();
      setIsLive(connected);
      setLiveStatus(liveConn.status);
      if (connected && liveConn.runId) {
        setLiveRunId(liveConn.runId);
      }
    };
    init();
    return () => { liveConn.destroy(); };
  }, []);

  // Load trace data (tries API first, then files, then demo)
  useEffect(() => {
    const tryLoad = async () => {
      // 1. If live and we have a runId, fetch from API
      if (isLive && liveRunId) {
        const data = await liveConn.fetchRunData(liveRunId);
        if (data && data.trace.length > 0) {
          setEvents(data.trace);
          if (data.discussion && data.discussion.length > 0) setLiveDiscussion(data.discussion);
          if (data.simulation) setLiveSimulation(data.simulation);
          setLoading(false);
          // Connect WebSocket for real-time updates
          liveConn.connectWebSocket(liveRunId);
          return;
        }
      }
      // 2. Server mode: try API endpoint directly
      const apiPaths = ['/api/runs/latest/trace', '/api/trace'];
      for (const path of apiPaths) {
        try {
          const res = await fetch(path, { signal: AbortSignal.timeout(3000) });
          if (res.ok) {
            const data = await res.json();
            if (Array.isArray(data) && data.length > 0) {
              setEvents(data);
              setLoading(false);
              return;
            }
          }
        } catch(e) {}
      }
      // 3. File mode: try local file paths
      const filePaths = ['../outputs/trace.json', '../demo/cached_trace.json', 'trace.json'];
      for (const path of filePaths) {
        try {
          const res = await fetch(path);
          if (res.ok) {
            const data = await res.json();
            if (Array.isArray(data) && data.length > 0) {
              setEvents(data);
              setLoading(false);
              return;
            }
          }
        } catch(e) {}
      }
      // 4. Offline mode: use embedded demo data
      setEvents(DEMO_DATA);
      setLoading(false);
    };
    tryLoad();
  }, [isLive, liveRunId]);

  // WebSocket listener for real-time updates
  useEffect(() => {
    if (!isLive) return;
    const unsub = liveConn.subscribe((msg) => {
      setLiveStatus(liveConn.status);
      if (msg.type === 'ws_event' && msg.data) {
        const ev = msg.data;
        // Append new event to the trace
        if (ev.event_type || ev.type) {
          setEvents(prev => {
            const eventId = ev.event_id || ev.id;
            // Avoid duplicates
            if (eventId && prev.some(e => (e.event_id || e.id) === eventId)) return prev;
            return [...prev, ev];
          });
          setWsEvents(prev => [...prev, ev]);
          // Play sounds for significant events
          if (ev.event_type === 'BLOCKER') audioManager.play('blocker');
          else if (ev.event_type === 'PIVOT') audioManager.play('pivot');
          else if (['PROTOTYPE_READY','FINANCIAL_MODEL_READY','GTM_READY','COMPLIANCE_REPORT_READY'].includes(ev.event_type)) {
            audioManager.play('agent_complete');
          }
        }
        // Also handle discussion updates
        if (ev.event_type === 'BOARD_DISCUSSION' || ev.discussion) {
          const entry = ev.discussion || ev;
          setLiveDiscussion(prev => prev ? [...prev, entry] : [entry]);
        }
        // Handle simulation updates
        if (ev.event_type === 'SIMULATION_RESULT' || ev.simulation) {
          setLiveSimulation(ev.simulation || ev.payload);
        }
      }
      if (msg.type === 'ws_connected') {
        setLiveStatus('streaming');
      }
    });
    return unsub;
  }, [isLive]);

  // Auto-refresh: poll for new runs every 5 seconds when live
  useEffect(() => {
    if (!isLive) return;
    liveConn.startPolling(async (msg) => {
      if (msg.type === 'new_run') {
        // A new run appeared - switch to it
        setLiveRunId(msg.runId);
        liveConn.connectWebSocket(msg.runId);
        // Fetch the new run's data
        const data = await liveConn.fetchRunData(msg.runId);
        if (data && data.trace.length > 0) {
          setEvents(data.trace);
          if (data.discussion && data.discussion.length > 0) setLiveDiscussion(data.discussion);
          if (data.simulation) setLiveSimulation(data.simulation);
        }
      }
      if (msg.type === 'run_status' && msg.run) {
        // Refresh data if the run is still in progress
        const status = msg.run.status;
        if (status === 'running' || status === 'pending') {
          const data = await liveConn.fetchRunData(msg.run.run_id || msg.run.id);
          if (data && data.trace.length > 0) {
            setEvents(data.trace);
            if (data.discussion && data.discussion.length > 0) setLiveDiscussion(data.discussion);
            if (data.simulation) setLiveSimulation(data.simulation);
          }
        }
      }
    }, 5000);
    return () => liveConn.stopPolling();
  }, [isLive]);

  const pivotCount = events.filter(e => e.event_type === 'PIVOT').length;
  // Estimate API cost from event counts
  const llmCalls = events.filter(e => e.payload?.action === 'llm_call').length;
  const totalCost = llmCalls > 0 ? (llmCalls * 0.003 + (events.length - llmCalls) * 0.0001) : 0.19;

  const handleLaunch = (concept, runId) => {
    if (runId) {
      setLiveRunId(runId);
      liveConn.connectWebSocket(runId);
    }
    setScreen('dashboard');
  };

  if (screen === 'mission-control') {
    return <MissionControl onLaunch={handleLaunch} isLive={isLive} />;
  }

  if (loading) return (
    <div className="flex items-center justify-center min-h-screen">
      <div className="text-indigo-400 text-xl animate-pulse">
        {isLive ? 'Loading live data from server...' : 'Loading trace data...'}
      </div>
    </div>
  );

  const mainTabs = [
    { id: 'timeline', label: 'Event Timeline' },
    { id: 'boardroom', label: 'Boardroom' },
    { id: 'arena', label: 'Market Arena' },
    { id: 'pivots', label: `Pivot Trace (${pivotCount})` },
    { id: 'pivotflow', label: 'Pivot Flow' },
    { id: 'sentiment', label: 'Sentiment' },
    { id: 'analytics', label: 'Analytics' },
    { id: 'report', label: 'Sprint Report' },
  ];

  return (
    <div className="min-h-screen pb-12">
      <Header events={events.length} pivots={pivotCount} cost={totalCost} isLive={isLive} liveStatus={liveStatus} />

      <div className="max-w-7xl mx-auto px-6 mt-8 main-container">
        {/* Tab navigation */}
        <div className="flex gap-1 mb-6 border-b border-slate-700/50 tab-nav-wrap">
          {mainTabs.map(t => (
            <button key={t.id} onClick={() => {
              if (t.id === activeTab) return;
              audioManager.play('tab_switch');
              setTabTransition('screen-exit');
              setTimeout(() => {
                setActiveTab(t.id);
                setRenderedTab(t.id);
                setTabTransition('screen-enter');
              }, 250);
            }}
              className={`px-5 py-3 text-sm font-medium transition-colors whitespace-nowrap ${activeTab === t.id ? 'tab-active' : 'tab-inactive'}`}>
              {t.label}
            </button>
          ))}
        </div>

        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 main-grid">
          {/* Main content */}
          <div className="lg:col-span-2">
            <div className={`rounded-2xl border border-slate-700/30 bg-slate-900/40 backdrop-blur-sm p-6 glow content-card ${tabTransition}`}>
              {renderedTab === 'timeline' && <Timeline events={events} />}
              {renderedTab === 'boardroom' && <BoardroomView events={events} liveDiscussion={liveDiscussion} isLive={isLive} runId={liveRunId} />}
              {renderedTab === 'arena' && <MarketArena events={events} liveSimulation={liveSimulation} isLive={isLive} runId={liveRunId} />}
              {renderedTab === 'pivots' && <PivotTrace events={events} />}
              {renderedTab === 'pivotflow' && <PivotFlow events={events} />}
              {renderedTab === 'sentiment' && <SentimentDashboard events={events} />}
              {renderedTab === 'analytics' && <AdvancedCharts events={events} />}
              {renderedTab === 'report' && <SprintReport events={events} isLive={isLive} runId={liveRunId} />}
            </div>
          </div>

          {/* Sidebar */}
          <div className="space-y-6 fade-in fade-in-delay-2">
            <div className="rounded-2xl border border-slate-700/30 bg-slate-900/40 backdrop-blur-sm p-6 glow sidebar-section">
              <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">Agent Activity</h3>
              <CostChart events={events} />
            </div>
            <div className="rounded-2xl border border-slate-700/30 bg-slate-900/40 backdrop-blur-sm p-6 glow sidebar-section">
              <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">Market Sentiment</h3>
              <SentimentChart events={events} />
            </div>
          </div>
        </div>
      </div>

      <footer className="text-center text-xs text-slate-600 mt-12">
        Built at Ralphthon SF 2026 | Ghost Board v1.0
        {isLive && liveRunId && <span className="ml-2 text-slate-700">| Run: {liveRunId.substring(0, 8)}...</span>}
      </footer>
    </div>
  );
}
