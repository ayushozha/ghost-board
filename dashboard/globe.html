<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghost Board - Global Market Simulation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; overflow: hidden; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400&display=swap');

  #canvas-container { width: 100vw; height: 100vh; position: relative; }
  canvas { display: block; }

  /* Overlay UI */
  .overlay { position: absolute; pointer-events: none; }
  .overlay.interactive { pointer-events: auto; }

  #header {
    top: 20px; left: 20px; right: 20px;
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  #title { font-size: 28px; font-weight: 900; }
  #title span { background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  #stats { display: flex; gap: 24px; text-align: center; }
  .stat-value { font-size: 24px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .stat-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
  .stat-green { color: #22c55e; }
  .stat-red { color: #ef4444; }
  .stat-blue { color: #6366f1; }

  #feed {
    top: 80px; right: 20px; width: 340px; bottom: 80px;
    overflow-y: auto; scrollbar-width: thin; scrollbar-color: #4f46e5 #0f172a;
  }
  .feed-item {
    background: rgba(15, 23, 42, 0.85); border: 1px solid rgba(99, 102, 241, 0.15);
    border-radius: 12px; padding: 12px; margin-bottom: 8px;
    backdrop-filter: blur(10px); animation: fadeSlideIn 0.5s ease;
  }
  .feed-item .name { font-weight: 700; font-size: 13px; }
  .feed-item .badge { font-size: 9px; padding: 2px 6px; border-radius: 20px; font-weight: 600; }
  .feed-item .content { font-size: 12px; color: #94a3b8; margin-top: 4px; line-height: 1.4; }
  .feed-item .meta { font-size: 10px; color: #475569; margin-top: 4px; }
  .badge-vc { background: rgba(234, 179, 8, 0.2); color: #eab308; }
  .badge-early_adopter { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
  .badge-skeptic { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
  .badge-journalist { background: rgba(168, 85, 247, 0.2); color: #a855f7; }
  .badge-competitor { background: rgba(249, 115, 22, 0.2); color: #f97316; }
  .badge-regulator { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }

  #round-bar {
    bottom: 20px; left: 20px; right: 20px;
    background: rgba(15, 23, 42, 0.85); border: 1px solid rgba(99, 102, 241, 0.2);
    border-radius: 12px; padding: 12px 20px; display: flex; align-items: center; gap: 16px;
    backdrop-filter: blur(10px);
  }
  #round-progress { flex: 1; height: 4px; background: #1e293b; border-radius: 2px; overflow: hidden; }
  #round-fill { height: 100%; background: linear-gradient(90deg, #6366f1, #a855f7); transition: width 0.5s ease; }

  @keyframes fadeSlideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes pulse { 0%,100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.5); opacity: 1; } }
</style>
</head>
<body>
<div id="canvas-container">
  <!-- Header overlay -->
  <div id="header" class="overlay">
    <div>
      <div id="title"><span>Ghost Board</span> Global Simulation</div>
      <div style="font-size:12px; color:#64748b; margin-top:4px;">Real personas from real companies, reacting in real time</div>
    </div>
    <div id="stats">
      <div><div class="stat-value stat-blue" id="total-agents">1,030</div><div class="stat-label">Total Agents</div></div>
      <div><div class="stat-value stat-green" id="sentiment">+0.00</div><div class="stat-label">Sentiment</div></div>
      <div><div class="stat-value" id="round-num">0/5</div><div class="stat-label">Round</div></div>
    </div>
  </div>

  <!-- Feed overlay -->
  <div id="feed" class="overlay interactive"></div>

  <!-- Round bar -->
  <div id="round-bar" class="overlay">
    <span style="font-size:12px; color:#94a3b8; font-weight:600;">Simulation Progress</span>
    <div id="round-progress"><div id="round-fill" style="width:0%"></div></div>
    <span id="round-text" style="font-size:12px; color:#6366f1; font-weight:600;">Ready</span>
  </div>
</div>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Scene setup ──
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 1, 3.5);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000);
document.getElementById('canvas-container').prepend(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.3;
controls.minDistance = 2;
controls.maxDistance = 8;

// ── Earth ──
const earthGeo = new THREE.SphereGeometry(1, 64, 64);
const earthMat = new THREE.MeshPhongMaterial({
  color: 0x1a1a2e,
  emissive: 0x0a0a1a,
  specular: 0x333366,
  shininess: 5,
  transparent: true,
  opacity: 0.9,
});
const earth = new THREE.Mesh(earthGeo, earthMat);
scene.add(earth);

// Wireframe overlay
const wireGeo = new THREE.SphereGeometry(1.002, 32, 32);
const wireMat = new THREE.MeshBasicMaterial({ color: 0x2a2a4a, wireframe: true, transparent: true, opacity: 0.15 });
scene.add(new THREE.Mesh(wireGeo, wireMat));

// Atmosphere glow
const glowGeo = new THREE.SphereGeometry(1.05, 32, 32);
const glowMat = new THREE.ShaderMaterial({
  uniforms: { c: { value: 0.4 }, p: { value: 4.0 }, glowColor: { value: new THREE.Color(0x4f46e5) } },
  vertexShader: `varying vec3 vNormal; void main(){ vNormal=normalize(normalMatrix*normal); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader: `uniform float c; uniform float p; uniform vec3 glowColor; varying vec3 vNormal; void main(){ float intensity=pow(c-dot(vNormal,vec3(0,0,1.0)),p); gl_FragColor=vec4(glowColor,intensity*0.5); }`,
  side: THREE.BackSide, transparent: true, blending: THREE.AdditiveBlending,
});
scene.add(new THREE.Mesh(glowGeo, glowMat));

// Lights
scene.add(new THREE.AmbientLight(0x404060, 0.5));
const dirLight = new THREE.DirectionalLight(0x6366f1, 0.8);
dirLight.position.set(5, 3, 5);
scene.add(dirLight);

// Stars
const starsGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(3000);
for (let i = 0; i < 3000; i++) { starPos[i] = (Math.random() - 0.5) * 50; }
starsGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.02 })));

// ── Persona dots ──
const COLORS = {
  vc: 0xeab308, early_adopter: 0x3b82f6, skeptic: 0xef4444,
  journalist: 0xa855f7, competitor: 0xf97316, regulator: 0xef4444,
};

function latLngToVec3(lat, lng, radius = 1.02) {
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lng + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -radius * Math.sin(phi) * Math.cos(theta),
    radius * Math.cos(phi),
    radius * Math.sin(phi) * Math.sin(theta),
  );
}

// ── Load persona data ──
const personas = [];
let currentRound = 0;
const totalRounds = 5;

// Demo data (embedded fallback)
const DEMO_PERSONAS = [
  { name: "Marcus Chen", archetype: "vc", lat: 37.7749, lng: -122.4194, city: "San Francisco", company: "a16z", messages: [{ round: 1, content: "Strong thesis on compliance infrastructure. CAC concerns.", sentiment: 0.4 }] },
  { name: "Rachel Goldstein", archetype: "vc", lat: 37.4419, lng: -122.1430, city: "Palo Alto", company: "Ribbit Capital", messages: [{ round: 1, content: "Unit economics need work. Regulatory moat is interesting.", sentiment: 0.3 }] },
  { name: "James Hartley", archetype: "vc", lat: 40.7128, lng: -74.0060, city: "New York", company: "Paradigm", messages: [{ round: 1, content: "Stablecoins are the killer app. This could work.", sentiment: 0.6 }] },
  { name: "Sarah Mitchell", archetype: "early_adopter", lat: 37.7749, lng: -122.4194, city: "San Francisco", company: "Stripe Treasury", messages: [{ round: 1, content: "API-first approach is right. Need to see latency benchmarks.", sentiment: 0.5 }] },
  { name: "Oliver Brooks", archetype: "skeptic", lat: 38.9072, lng: -77.0369, city: "Washington DC", company: "Former CFPB", messages: [{ round: 1, content: "AI cannot replace human judgment in compliance. Systemic risk.", sentiment: -0.6 }] },
  { name: "Alex Rivera", archetype: "journalist", lat: 40.7128, lng: -74.0060, city: "New York", company: "TechCrunch", messages: [{ round: 1, content: "Show me the moat. How is this different from Chainalysis?", sentiment: 0.0 }] },
  { name: "Thomas Weber", archetype: "competitor", lat: 42.3601, lng: -71.0589, city: "Boston", company: "Circle (USDC)", messages: [{ round: 1, content: "We already have regulatory approval. Good luck with licensing.", sentiment: -0.7 }] },
  { name: "Director Collins", archetype: "regulator", lat: 38.9012, lng: -77.2653, city: "Vienna, VA", company: "FinCEN", messages: [{ round: 1, content: "MSB registration is mandatory per 31 CFR 1022.", sentiment: -0.5 }] },
  { name: "Nina Sharma", archetype: "early_adopter", lat: 19.0760, lng: 72.8777, city: "Mumbai", company: "Razorpay", messages: [{ round: 1, content: "Cross-border compliance is the hardest problem. Need multi-jurisdiction.", sentiment: 0.3 }] },
  { name: "Wei Zhang", archetype: "journalist", lat: 1.3521, lng: 103.8198, city: "Singapore", company: "The Block", messages: [{ round: 2, content: "Stablecoin regulation is imminent globally. Timing matters.", sentiment: 0.2 }] },
  { name: "Fatima Al-Hassan", archetype: "competitor", lat: 25.2048, lng: 55.2708, city: "Dubai", company: "Chainalysis", messages: [{ round: 2, content: "We own the compliance data layer. Years of training data.", sentiment: -0.8 }] },
  { name: "Carlos Mendoza", archetype: "early_adopter", lat: -23.5505, lng: -46.6333, city: "Sao Paulo", company: "Nubank", messages: [{ round: 2, content: "LATAM compliance is fragmented. Need Portuguese support.", sentiment: 0.2 }] },
  { name: "Amara Okafor", archetype: "early_adopter", lat: 6.5244, lng: 3.3792, city: "Lagos", company: "Flutterwave", messages: [{ round: 2, content: "African compliance is underserved. Mobile money integration essential.", sentiment: 0.5 }] },
  { name: "Helen Frost", archetype: "skeptic", lat: 51.5074, lng: -0.1278, city: "London", company: "Deloitte Risk", messages: [{ round: 2, content: "Startups lack enterprise resilience. Bank-grade security required.", sentiment: -0.5 }] },
  { name: "Kenji Taniguchi", archetype: "skeptic", lat: 35.6762, lng: 139.6503, city: "Tokyo", company: "MUFG", messages: [{ round: 2, content: "Vendor risk assessment takes 18 months. AI explainability mandatory.", sentiment: -0.4 }] },
];

// Try loading from file, fallback to embedded
async function loadPersonas() {
  try {
    const res = await fetch('../outputs/simulation_geo.json');
    if (res.ok) return await res.json();
  } catch(e) {}
  return DEMO_PERSONAS;
}

const personaData = await loadPersonas();
const dotGroup = new THREE.Group();
scene.add(dotGroup);

personaData.forEach((p, i) => {
  const pos = latLngToVec3(p.lat, p.lng);
  const color = COLORS[p.archetype] || 0x6b7280;

  // Dot
  const dotGeo = new THREE.SphereGeometry(0.015, 8, 8);
  const dotMat = new THREE.MeshBasicMaterial({ color });
  const dot = new THREE.Mesh(dotGeo, dotMat);
  dot.position.copy(pos);
  dotGroup.add(dot);

  // Glow ring
  const ringGeo = new THREE.RingGeometry(0.02, 0.035, 16);
  const ringMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.copy(pos);
  ring.lookAt(0, 0, 0);
  dotGroup.add(ring);

  personas.push({ data: p, dot, ring, pos });
});

// ── Animation ──
const feedEl = document.getElementById('feed');
let msgIndex = 0;

function addFeedItem(persona) {
  const msgs = persona.data.messages || [];
  if (msgs.length === 0) return;
  const msg = msgs[msgIndex % msgs.length];
  const div = document.createElement('div');
  div.className = 'feed-item';
  div.innerHTML = `
    <div style="display:flex; align-items:center; gap:6px;">
      <span class="name">${persona.data.name}</span>
      <span class="badge badge-${persona.data.archetype}">${persona.data.archetype}</span>
      <span style="font-size:10px; color:#475569;">${persona.data.city || ''}</span>
    </div>
    <div class="content">${msg.content}</div>
    <div class="meta">${persona.data.company || ''} | Sentiment: ${msg.sentiment > 0 ? '+' : ''}${msg.sentiment.toFixed(1)}</div>
  `;
  feedEl.prepend(div);
  if (feedEl.children.length > 20) feedEl.lastChild.remove();
}

// Pulse animation
function pulsePersona(idx) {
  const p = personas[idx];
  if (!p) return;
  p.dot.scale.set(2, 2, 2);
  p.ring.material.opacity = 0.8;
  setTimeout(() => { p.dot.scale.set(1, 1, 1); p.ring.material.opacity = 0.3; }, 1000);
  addFeedItem(p);
}

// Simulate rounds
let simTime = 0;
const ROUND_DURATION = 4; // seconds per round

function updateSimulation(dt) {
  simTime += dt;
  const roundFloat = simTime / ROUND_DURATION;
  currentRound = Math.min(Math.floor(roundFloat) + 1, totalRounds);

  // Update UI
  document.getElementById('round-num').textContent = `${currentRound}/${totalRounds}`;
  document.getElementById('round-fill').style.width = `${Math.min(roundFloat / totalRounds * 100, 100)}%`;
  document.getElementById('round-text').textContent = currentRound <= totalRounds ? `Round ${currentRound}` : 'Complete';

  // Pulse random persona periodically
  if (Math.random() < dt * 2 && currentRound <= totalRounds) {
    const idx = Math.floor(Math.random() * personas.length);
    pulsePersona(idx);
    msgIndex++;
  }

  // Update sentiment display
  const avgSent = personas.reduce((s, p) => {
    const msgs = p.data.messages || [];
    return s + (msgs.length > 0 ? msgs[0].sentiment : 0);
  }, 0) / Math.max(personas.length, 1);
  const sentEl = document.getElementById('sentiment');
  sentEl.textContent = `${avgSent > 0 ? '+' : ''}${avgSent.toFixed(2)}`;
  sentEl.className = `stat-value ${avgSent > 0.1 ? 'stat-green' : avgSent < -0.1 ? 'stat-red' : ''}`;
}

// Update total agents display
document.getElementById('total-agents').textContent = `${(personas.length + 1000).toLocaleString()}`;

// ── Render loop ──
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  controls.update();
  dotGroup.rotation.y = earth.rotation.y; // keep dots on earth
  updateSimulation(dt);
  renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
