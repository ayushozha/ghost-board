    <text x="40" y="35" text-anchor="middle" fill="#eab308" font-size="24">&#128081;</text>
    <text x="40" y="55" text-anchor="middle" fill="#eab308" font-size="10" font-weight="bold" font-family="Inter">CEO</text>
    <text x="40" y="95" text-anchor="middle" fill="#64748b" font-size="8" font-family="Inter">Strategy</text>
    <text x="40" y="107" text-anchor="middle" fill="#64748b" font-size="8" font-family="Inter">& Pivots</text>
  </g>
  <!-- CTO -->
  <g transform="translate(135,10)">
    <circle cx="40" cy="40" r="35" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="2" filter="url(#g)"/>
    <text x="40" y="35" text-anchor="middle" fill="#3b82f6" font-size="24">&#128187;</text>
    <text x="40" y="55" text-anchor="middle" fill="#3b82f6" font-size="10" font-weight="bold" font-family="Inter">CTO</text>
    <text x="40" y="95" text-anchor="middle" fill="#64748b" font-size="8" font-family="Inter">Codex</text>
