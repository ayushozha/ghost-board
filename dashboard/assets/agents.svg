    <text x="40" y="35" text-anchor="middle" fill="#22c55e" font-size="24">&#128200;</text>
    <text x="40" y="55" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="bold" font-family="Inter">CFO</text>
    <text x="40" y="95" text-anchor="middle" fill="#64748b" font-size="8" font-family="Inter">Financial</text>
    <text x="40" y="107" text-anchor="middle" fill="#64748b" font-size="8" font-family="Inter">Model</text>
  </g>
  <!-- CMO -->
  <g transform="translate(365,10)">
    <circle cx="40" cy="40" r="35" fill="#a855f7" opacity="0.15" stroke="#a855f7" stroke-width="2" filter="url(#g)"/>
    <text x="40" y="35" text-anchor="middle" fill="#a855f7" font-size="24">&#128640;</text>
    <text x="40" y="55" text-anchor="middle" fill="#a855f7" font-size="10" font-weight="bold" font-family="Inter">CMO</text>
